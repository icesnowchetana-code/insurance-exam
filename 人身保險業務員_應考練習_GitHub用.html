<!DOCTYPE html>

<head>

<title>人身保險業務員資格測驗 應考練習</title>
<style>
:root{
  --navy:#1C2B45;
  --navy-dim:#2E4061;
  --paper:#F1EEE6;
  --paper-raised:#FAF8F3;
  --ink:#26241E;
  --slate:#5B6470;
  --line:#DCD6C6;
  --gold:#A9824C;
  --gold-dim:#E7D9BD;
  --jade:#2F6F62;
  --jade-bg:#E2EEE8;
  --seal:#A8392E;
  --seal-bg:#F3E2DE;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.6;
}
.app{max-width:720px;margin:0 auto;padding:28px 20px 60px;}
h1,h2,h3{font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;font-weight:700;margin:0;}
.eyebrow{font-size:12px;letter-spacing:.12em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:6px;}
.stat-num{font-family:"SF Mono","Consolas","Menlo",monospace;}
.card{background:var(--paper-raised);border:1px solid var(--line);border-radius:6px;padding:18px 20px;margin-bottom:16px;}
.btn{
  display:inline-block;border:1.5px solid var(--navy);background:var(--navy);color:#fff;
  font-size:15px;font-weight:700;padding:11px 22px;border-radius:4px;cursor:pointer;
  font-family:inherit;text-align:center;
}
.btn:hover{background:var(--navy-dim);}
.btn.secondary{background:transparent;color:var(--navy);}
.btn.secondary:hover{background:var(--gold-dim);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.tag{display:inline-block;font-size:12px;padding:3px 9px;border-radius:3px;background:var(--gold-dim);color:#5C4521;font-weight:700;}
.hidden{display:none !important;}
.seal-badge{
  width:54px;height:54px;border-radius:50%;border:2.5px solid var(--seal);color:var(--seal);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
  transform:rotate(-8deg);flex-shrink:0;font-family:"Noto Serif TC",serif;
}
.seal-badge.pass{border-color:var(--jade);color:var(--jade);}
.chapter-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);}
.chapter-row:last-child{border-bottom:none;}
.chapter-name{flex:0 0 150px;font-size:13px;color:var(--slate);}
.bar-track{flex:1;height:12px;background:var(--line);border-radius:6px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:6px;}
.bar-val{flex:0 0 38px;text-align:right;font-size:13px;font-weight:700;}
.opt{
  display:block;width:100%;text-align:left;padding:13px 16px;margin-bottom:9px;
  border:1.5px solid var(--line);border-radius:5px;background:var(--paper-raised);
  font-family:inherit;font-size:15px;color:var(--ink);cursor:pointer;
}
.opt:hover{border-color:var(--gold);}
.opt.selected{border-color:var(--navy);background:#EFEAF5;}
.opt.correct{border-color:var(--jade);background:var(--jade-bg);}
.opt.wrong{border-color:var(--seal);background:var(--seal-bg);}
.opt.disabled-look{cursor:default;}
.qmeta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.qid{font-size:12px;color:var(--slate);}
.errtag{font-size:12px;color:var(--seal);font-weight:700;}
.qtext{font-size:17px;margin-bottom:16px;white-space:pre-wrap;}
.progressbar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:22px;}
.progressfill{height:100%;background:var(--gold);}
.exp-box{margin-top:14px;padding:13px 16px;background:#EFEAF5;border-left:3px solid var(--navy);border-radius:0 4px 4px 0;font-size:14px;color:#3a3650;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-size:13px;color:var(--slate);}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);}
.checkbox-row:last-child{border-bottom:none;}
.timer{font-family:"SF Mono","Consolas",monospace;font-weight:700;}
.timer.low{color:var(--seal);}
.subj-tabs{display:flex;gap:8px;margin-bottom:18px;}
.subj-tab{flex:1;padding:9px 6px;border:1.5px solid var(--line);background:var(--paper-raised);border-radius:5px;font-family:inherit;font-size:14px;font-weight:700;color:var(--slate);cursor:pointer;}
.subj-tab.active{border-color:var(--navy);background:var(--navy);color:#fff;}
</style>

<div class="app" id="app"></div>
<script>
const QUESTION_DATA = {"subjects": [{"subject": "保險法規", "subjectKey": "fagui", "officialQuestions": 100, "officialMinutes": 80, "chapters": [{"num": 1, "name": "人身保險契約", "questions": [{"id": "fagui-ch1-001", "err": 72, "q": "有關要保人何者為非?", "opts": ["須投保時填寫要保書並善盡告知、通知保險公司保險事故發生之義務", "向保險人申請訂立保險契約之人", "有指定各項保險金受益人、申請保險單借款及聲明保費自動墊繳之權利", "以上皆是"], "ans": 3, "exp": "失能保險金、醫療保險金之受益人皆為被保險人本人，要保人無法指定受益人。"}, {"id": "fagui-ch1-002", "err": 67, "q": "有關保險受益人之規定,何者正確?A.因保險給付不同可區分為滿期、身故、失能或醫療、年金及紅利等受益人;B.為人身保險契約關係人;C.保險事故發生時有權受領保險金,而失能保險金之受益人不以被保險人為限;D.與要保人、被保險人須具有保險利益", "opts": ["BCD", "AB", "ABCD", "ABD"], "ans": 2, "exp": "C保險事故發生時有權受領保險金，而失能保險金之受益人僅以被保險人為限；D要保人只對被保險人具有保險利益。"}, {"id": "fagui-ch1-003", "err": 64, "q": "債權人未經債務人書面承認而逕以債務人為被保險人訂立之年金保險契約", "opts": ["停效", "無效", "有效", "視情形而定"], "ans": 3, "exp": "年金保險契約是生存契約，且年金保險契約無道德風險問題，故仍有效。"}, {"id": "fagui-ch1-004", "err": 61, "q": "下列何者為是?A.人壽保險之保險費可以訴訟方法請求交付;B.利害關係人得代要保人交付保險費;C.受益人經指定後,要保人對其保險利益喪失處分權;D.受益人得於部分條件下將其利益轉讓他人", "opts": ["BD", "BCD", "ABCD", "B"], "ans": 1, "exp": "A人壽保險之保險費不得以訴訟方式請求交付；C受益人經指定後，要保人對其保險利益除聲明放棄處分權者外，仍得以契約或遺囑處分之。"}, {"id": "fagui-ch1-005", "err": 60, "q": "對於要保人的敘述,何者錯誤?", "opts": ["要保人訂立保險契約不得委由代理人代理", "要保人可以為自然人或法人", "要保人負有交付保險費之義務", "要保人對被保險人須具有保險利益"], "ans": 1, "exp": "依保險法第46條：「保險契約由代理人訂立者，應載明代訂之意旨。」之規定辦理，故得委由代理人代理。"}, {"id": "fagui-ch1-006", "err": 59, "q": "分攤原則其主要目的是", "opts": ["確定保險人賠償責任", "使要保人不致不當得利", "使被保險人不致不當得利", "以上皆非"], "ans": 3, "exp": "分攤原則主要目的是使被保險人不致不當得利，由損害填補原則延伸而來。"}, {"id": "fagui-ch1-007", "err": 58, "q": "人壽保險受益人之指定何者正確?A.除自然人外,得指定法人;B.得指定㇐人或數人;C.可同時指定自然人及法人;D.訂立保險契約時得僅載明確定受益人之方法", "opts": ["ABCD", "ABC", "BD", "ABD"], "ans": 2, "exp": "D.指定受益人時，不限於指出受益人之姓名，即以類名指定亦可，如配偶、子女。"}, {"id": "fagui-ch1-008", "err": 57, "q": "要保人對下列何者之生命或身體,無保險利益", "opts": ["債務人", "本人", "為本人管理財產或利益之人", "生活費或教育費所收受之人"], "ans": 4, "exp": "要保人對於本人或其家屬、生活費或教育費所仰給之人、債務人、為本人管理財產或利益之人的生命或身體，有保險利益。"}, {"id": "fagui-ch1-009", "err": 53, "q": "下列有關保險代位原則之敘述,何者正確?", "opts": ["人壽保險與產物保險依法均得代位行使請求權", "人壽保險不得代位行使請求權", "指事故發生時,由保險人代位行使被保險對第三人之請求權", "以上皆是"], "ans": 2, "exp": "(1)僅產物保險得行使代位請求權；(3)指保險人於給付賠償後，代位行使被保險人對第三人之請求權。"}, {"id": "fagui-ch1-010", "err": 49, "q": "何者非要保人可指定受益人領取之保險金?A.失能保險金;B.醫療保險金;C.終身壽險保險金;D.年金保險金", "opts": ["BCD", "ACD", "ABD", "AB"], "ans": 4, "exp": "失能保險金、醫療保險金之受益人以被保險人本人為限，且不得事後加以變更。"}, {"id": "fagui-ch1-011", "err": 49, "q": "對於損害填補原則之敘述何者正確?A.防止被保險人不當得利;B.需保險人有二張以上保險單才可能發生;C.僅適用於人身保險;D.僅適用於財產保險", "opts": ["AD", "A", "BD", "ABC"], "ans": 2, "exp": "B僅一張保險單即可發生；CD損害補償原則大部份適用於財產保險，人身保險僅有實支實付健康險適用。"}, {"id": "fagui-ch1-012", "err": 48, "q": "按照我國保險法條規定,受益人有疑義時,推定誰為受益人?", "opts": ["要保人", "被保險人", "被保險人之法定繼承人", "以上三者皆可"], "ans": 1, "exp": "依保險法第45條第2項規定：「受益人有疑義時，推定要保人為自己之利益而訂立。」即由法律推定以要保人為受益人。"}, {"id": "fagui-ch1-013", "err": 48, "q": "有關各項保險給付之受益人敘述何者錯誤?", "opts": ["身故保險金如作為被保險人遺產,應依民法繼承順位分配", "紅利給付之受益人皆為要保人", "醫療給付之受益人以被保險人為限,且不得事後加以變更", "滿期保險金受益人由要保人指定,變更時亦要保人申請"], "ans": 2, "exp": ""}, {"id": "fagui-ch1-014", "err": 48, "q": "要保人以契約或遺囑變更受益人時,非經通知,不得對抗", "opts": ["保險人", "受益人", "被保險人", "保險業務員"], "ans": 1, "exp": "要保人行使處分權時，非經通知，不能對抗保險人。指定及變更受益人，均要告知保險人。"}, {"id": "fagui-ch1-015", "err": 42, "q": "下列有關保險人之規定,何者為非?", "opts": ["目前國內之保險公司,均為股份有限公司", "非保險業不得兼營保險業務", "保險法之規定,保險業之組織以股份有限公司或合作社為限", "人身保險人可為法人或自然人"], "ans": 4, "exp": "(4)人身保險人僅能為法人。"}, {"id": "fagui-ch1-016", "err": 40, "q": "下列何者依保險法規定得代為交付保險費?A.信託業;B.被保險人;C.受益人;D.保險業務員", "opts": ["BCD", "BC", "ABCD", "ABC"], "ans": 4, "exp": "保險業務員不可代為交付保險費。"}, {"id": "fagui-ch1-017", "err": 37, "q": "依據保險法規定,要保人的權利包含A.變更失能及醫療保險金之受益人;B.行使契約撤銷權;C.申請契約變更;D.申請保險單借款、聲明續期保險費自動墊繳", "opts": ["ABCD", "ABD", "ABC", "BCD"], "ans": 4, "exp": "A失能及醫療保險金之受益人以被保險人本人為限，且不得事後加以變更。"}, {"id": "fagui-ch1-018", "err": 37, "q": "下列何者不是限制行為能力人訂定保險契約之生效方式", "opts": ["經受益人同意", "經其法定代理人事後承認", "於限制原因消滅後自己承認", "經其法定代理人事前允許"], "ans": 1, "exp": ""}, {"id": "fagui-ch1-019", "err": 35, "q": "張三以自己為要保人,對下列何者生命或身體有保險利益?A.借錢給張三的李四;B.張三本人;C.欠張三錢的王老五", "opts": ["AB", "A", "BC", "AB"], "ans": 3, "exp": "要保人對於下列各人之生命或身體有保險利益：本人或其家屬(B.張三本人)、生活費或教育費所仰給之人、債務人(C.欠張三錢的王老五)、為本人管理財產或利益之人。A.債權人(借錢給張三的李四)無保險利益。"}, {"id": "fagui-ch1-020", "err": 35, "q": "有關保險利益之敘述,何者有誤?", "opts": ["凡基於有效契約而生之利益,得為保險利益", "被保險人死亡,保險契約除另有訂定外,仍為繼承人之利益而存在", "合夥人為被保險人時,其中㇐人讓與保險利益於他人者,保險契約失其效力", "要保人對於因財產上之現有利益而生之期待利益,有保險利益"], "ans": 3, "exp": "(3)合夥人為被保險人時，其中一人讓與保險利益於他人者，保險契約不因之而失效。"}, {"id": "fagui-ch1-021", "err": 34, "q": "依保險法第20條規定基於有效契約而生之利益", "opts": ["得為保險利益", "僅得對有效契約有保險利益", "不得為保險利益", "以上皆是"], "ans": 1, "exp": "保險法第20條規定，於有效契約而生之利益，亦得為保險利益。"}, {"id": "fagui-ch1-022", "err": 30, "q": "利率變動型年金保險甲型為", "opts": ["變動年金金額", "不固定年金金額", "彈性年金金額", "固定年金金額"], "ans": 4, "exp": ""}]}, {"num": 2, "name": "人身保險契約條款", "questions": [{"id": "fagui-ch2-001", "err": 80, "q": "有關保險契約之敘述,何者正確?", "opts": ["當事人㇐方違背特約條款時,即使危險已發生,他方仍得解除契約", "當事人㇐方對於他方應通知之事項怠於通知者,僅於故意造成,他方始得據為解約之原因", "非因要保人或被保險人行為致危險增加時,要保人或被保險人如未及時通知,對於保險人因此所受之損失,免負賠償責任", "以上皆是"], "ans": 1, "exp": ""}, {"id": "fagui-ch2-002", "err": 79, "q": "保險契約法定終止事由有A.保險人破產時;B.要保人任意終止時;C.保險契約停效後且已逾申請復效所訂期限;D.保險標的物非因保險契約所載之事故而完全滅失時", "opts": ["AD", "ACD", "BC", "ABC"], "ans": 1, "exp": "保險契約法定終止事由有保險人破產時(A)、保險標的物非因保險契約所載之事故而完全滅失時(D)。"}, {"id": "fagui-ch2-003", "err": 77, "q": "有關保險法之規定何者正確?", "opts": ["傷害保險之受益人故意傷害被保險人未遂時,要保人得撤銷其受益權利", "要保人故意致被保險人於死者,保險人雖不負給付保險金額之責,但仍應將保單價值準備金繳交國庫", "人壽保險受益人故意致被保險人於死或雖未致死者,喪失其受益權", "以上皆是"], "ans": 3, "exp": ""}, {"id": "fagui-ch2-004", "err": 74, "q": "陳小華的父親曾於生前投保傷害保險貳百萬元,並以陳小華為死亡保險金受益人,但陳小華㇐直到父親因疾病死亡後二年,始知父親投保,此時保險公司", "opts": ["仍應如額給付保險金", "陳小華須證明確係不知其父投保事實才延遲申請,否則保險公司仍得拒絕給付", "僅給付保單價值準備金", "以上皆非"], "ans": 4, "exp": "傷害保險契約的定義係指被保險人遭受意外傷害及其所致失能或死亡時，負給付金額之責。本題陳小華父親因疾病死亡，故不理賠。"}, {"id": "fagui-ch2-005", "err": 74, "q": "關於復效之敘述何者正確?A要保人得在保單停效日起兩年之內申請復效;B停效期間屆滿,保險人有終止契約之權;C經保險公司同意並清償所積欠之保險費後,保單效力自當日零時起生效;D復效後保險費依停效時年齡之費率計算", "opts": ["ABCD", "AB", "ABD", "ACD"], "ans": 2, "exp": ""}, {"id": "fagui-ch2-006", "err": 73, "q": "關於寬限期間之敘述,何者錯誤?A.逾寬限期間仍未繳付保險費者,契約至寬限期間終了之翌日起終止效力;B.如在寬限期間發生保險事故,保險公司仍負給付責任;C.年繳或半年繳件,自保單所載之交付日期之翌日起30日為寬限期間;D.季繳或月繳件,至催告到達日期之翌日起30日為寬限期間", "opts": ["ABCD", "BCD", "ACD", "CD"], "ans": 3, "exp": ""}, {"id": "fagui-ch2-007", "err": 69, "q": "有關傷害保險契約,下列敘述何者正確?", "opts": ["僅得以自己為被保險人投保", "以職業為危險估計的主要依據", "㇐律採「追溯生效」", "契約效力自保單所載翌日零時起生效"], "ans": 2, "exp": "(1)只要符合保險利益均可；(3)(4)以保單所載的日時開始生效。"}, {"id": "fagui-ch2-008", "err": 67, "q": "有關住院醫療費用保險何者錯誤?", "opts": ["如有保證續保條款時,保險人不得拒絕續保及不得依續保當時之費率規定重新計算保費", "被保險人於契約有效期間屆滿出院,因同㇐疾病於出院後14日內於同㇐醫院再住院,保險人就再住院部分不給付保險金", "保戶如前往非屬健保特約院所就醫,保險人於限額內得按實際支出費用不低於65%給付", "以上皆非"], "ans": 1, "exp": ""}, {"id": "fagui-ch2-009", "err": 66, "q": "下列有關保險法第105條規定之敘述何者為非?", "opts": ["被保險人得隨時依本條為撤銷並通知要保人即生效力", "被保險人依本條行使撤銷權時,視為要保人終止契約", "由第三人訂立之死亡保險契約須經被保險人書面同意並約定保險金額,否則契約無效", "被保險人得隨時依本條所為之同意得隨時撤銷"], "ans": 1, "exp": "(1)撤銷之方式應以書面通知保險人及要保人。被保險人依規定行使其撤銷權者，視為要保人終止保險契約。"}, {"id": "fagui-ch2-010", "err": 64, "q": "有關保單價值準備金之計算,除依主管機關規定外並以何者為基礎?A.危險發生率;B.附加費用率;C.簽單保險費之利率;D.4行庫每月初牌告之2年期定存最高利率平均值", "opts": ["ABCD", "BCD", "AC", "ABC"], "ans": 3, "exp": ""}, {"id": "fagui-ch2-011", "err": 63, "q": "人壽保險單示範條款之保險費自動墊繳之規定,何者為非?", "opts": ["自動墊繳係以墊繳當時之保單價值準備金扣除借款本息後之餘額辦理", "保單價值準備金不足墊繳㇐日之保險費時,自翌日起契約效力停止", "自動墊繳經約定後仍可再變更", "每次墊繳保險費的本息,應由保險公司出具憑證交予要保人"], "ans": 2, "exp": ""}, {"id": "fagui-ch2-012", "err": 62, "q": "要保人以保險單為質向保險人借款,借款到期應將本息償還保險公司,逾期未償之本息超過保單價值準備金時,保險契約?", "opts": ["無效", "立即失效", "經書面通知到達後逾三十天仍未繳付時,保險契約之效力停止", "立即停效"], "ans": 4, "exp": "借款本息如超過保單價值準備金時，保單效力即停止，保險公司應於停效日前30日內以書面通知要保人。"}, {"id": "fagui-ch2-013", "err": 61, "q": "有關⾧期照顧保險,下列何者錯誤?", "opts": ["被保險人身故時保險金尚有未完全給付者,以被保險人法定繼承人為受益人", "被保險人身故時契約效力即行終止", "各項保險金受益人皆為被保險人,保險人不受理指定或變更", "要保人於契約有效期間不得申請減少保險金額"], "ans": 4, "exp": ""}, {"id": "fagui-ch2-014", "err": 61, "q": "有關人壽保險單示範條款復效通知之規定,何者有誤?", "opts": ["保險人於契約停效後至得申請復效之期限屆滿前1個月通知要保人復效權利", "保險人以書面、電子郵件、簡訊或其他約定方式擇㇐通知", "通知須載明未於期限屆滿前申請復效者,契約效力自期限屆滿之日翌日上午零時起終止", "保險人依要保人最後留存之聯絡資料發出通知,視為已完成通知"], "ans": 1, "exp": "自109年1月1日起，保險公司於申請復效期限屆滿前至少3個月將以書面、電子郵件、簡訊或其他約定方法擇一通知要保人行使申請復效之權利。"}, {"id": "fagui-ch2-015", "err": 59, "q": "失能保險金不論被保險人失能次數及程度如何,受益人得請領之總金額皆不得超過", "opts": ["責任準備金", "保險金額", "所繳保險費總額", "保單價值準備金"], "ans": 2, "exp": "被保險人於本契約有效期間內因不同意外傷害事故申領失能保險金時，保險公司累計給付金額最高以保險金額為限。"}, {"id": "fagui-ch2-016", "err": 59, "q": "要保人在保險契約有效期間內得申請減少保險金額,但不得低於最低承保金額,其減少部分視為", "opts": ["仍繼續有效", "解除契約", "停效", "終止契約"], "ans": 4, "exp": "要保人在保險契約有效期間內得申請減少保險金額，但不得低於最低承保金額，其減少部分視為終止契約。"}, {"id": "fagui-ch2-017", "err": 58, "q": "某甲曾於五年前投保死亡保險200萬元,後該保險因未繳保費於去年㇐月停效,今年十月又辦理復效完畢,某甲於復效兩個月後即跳海自殺身故,保險人對本案應如何處理?", "opts": ["不給付死亡保險金,但退還所繳保費", "完全不給付", "應照保險金額理賠", "僅返還保單價值準備金"], "ans": 4, "exp": "被保險人於投保或復效後2年內自殺身故，保險人不負給付保險金之責。本題復效僅二個月，保險人不負給付保險金之責，但保費付足二年以上者，保險公司應返還保單價值準備金於應得之人。"}, {"id": "fagui-ch2-018", "err": 58, "q": "利率變動型年金保險甲型為固定年金金額,在年金給付開始日,保險公司以當時所累積之年金保單價值準備金,依據當時_____及年金生命表計算可以領取之年金金額。", "opts": ["十年期公債殖利率", "預定利率", "宣告利率", "定存利率"], "ans": 2, "exp": "利率變動型年金保險甲型為固定年金金額，在年金給付開始日，保險公司以當時所累積之年金保單價值準備金(如有保險單借款應扣除保險單借款及其應負利息後)，依據當時預定利率及年金生命表計算可以領取之年金金額。"}, {"id": "fagui-ch2-019", "err": 58, "q": "依我國保險法第59條規定,保險契約內所載增加危險之情形,非由於要保人或被保險人之行為所致者,要保人或被保險人應於知悉後_____通知保險人。", "opts": ["十日內", "三十日內", "五日內", "二十日內"], "ans": 1, "exp": "風險增加：非由於要保人或被保險人所致者，10日內通知保險人；增加是由要保人或被保險人所致者，應於知悉後立即通知保險人。"}, {"id": "fagui-ch2-020", "err": 55, "q": "下列何者是旅行平安險與傷害險的不同?A.保險期間可否因特殊事故延⾧;B.承保時間計算之標準;C.除外責任項目;D.承保事故", "opts": ["CD", "ACD", "AC", "BCD"], "ans": 3, "exp": "傷害保險契約條款與旅行平安險不同之處：保險期間之延長、承保期間、除外責任。"}, {"id": "fagui-ch2-021", "err": 55, "q": "依保險法規定,傷害保險之保險費", "opts": ["到期未交付不適用寬限期間之規定", "保險人不得以訴訟請求交付", "利害關係人不得代要保人交付", "以上皆非"], "ans": 4, "exp": ""}, {"id": "fagui-ch2-022", "err": 55, "q": "下列何者不是健康保險給付事由?A.被保險人故意自殺;B.被保險人住院健康檢查;C.被保險人墮胎所致之死亡;D.被保險人因車禍流產。", "opts": ["ABC", "ABCD", "AC", "D"], "ans": 1, "exp": "健康險除外責任：故意行為、犯罪行為、健康檢查、懷孕、流產、分娩。"}, {"id": "fagui-ch2-023", "err": 55, "q": "因違反告知而得解除契約之權利,自保險公司知有解除原因經過_____不行使而消滅。", "opts": ["二年", "㇐年", "㇐個月", "二個月"], "ans": 3, "exp": "因違反告知而得解除契約之權利，自保險公司知有解除原因經過一個月不行使而消滅。"}, {"id": "fagui-ch2-024", "err": 54, "q": "申請復效時,要保人可以在保險契約停止效力6個月內清償欠繳保險費扣除停效期間的_____後之餘額及保險契約約定之利息後,翌日上午零時起開始恢復其效力。", "opts": ["危險保險費", "儲蓄保險費", "純保險費", "附加保險費"], "ans": 44, "q": "依遺產及贈與稅法第17條規定,被繼承人遺有受其扶養之兄弟姊妹者,每人得自遺產總額中扣除_____元,免徵遺產稅。", "opts": ["50萬", "100萬", "45萬", "40萬"], "ans": 4, "exp": "依遺產及贈與稅法第17條規定，被繼承人遺有受其扶養之兄弟姊妹者，每人得自遺產總額中扣除40萬元，免徵遺產稅。"}, {"id": "fagui-ch3-018", "err": 44, "q": "某甲身故後留有死亡保險金1,000萬元,因未指定身故受益人,若某甲沒有其他遺產,但立有遺囑將保險金全部歸配偶所有,在僅有配偶和父母之情形下,則該保險金,某甲父親可領到_____元。", "opts": ["333萬", "125萬", "250萬", "500萬"], "ans": 2, "exp": ""}, {"id": "fagui-ch3-019", "err": 42, "q": "A.滿期保險金;B.醫療保險金;C.死亡保險金;D.人壽保險單之紅利;上述何種保險給付在㇐定條件下免稅", "opts": ["ABCD", "ABC", "BCD", "ACD"], "ans": 1, "exp": "滿期保險金、醫療保險金、死亡保險金、人壽保險單之紅利皆為免稅。"}, {"id": "fagui-ch3-020", "err": 42, "q": "遺囑人於不違反關於_____規定之範圍內,得以遺囑自由處分遺產。", "opts": ["特留分", "應繼分", "保留分", "遺贈分"], "ans": 1, "exp": "被保險人立有遺囑時，依照遺囑分配，但必須考慮遺囑內容是否有侵害到法定繼承人的特留分。"}, {"id": "fagui-ch3-021", "err": 42, "q": "贈與人在㇐年內贈與他人之財產總值超過贈與稅免稅額時,應於超過免稅額之贈與行為發生後_____,向贈與人戶籍所在地之稅捐機關申報。", "opts": ["二個月內", "十日內", "三十日內", "二十日內"], "ans": 3, "exp": "贈與納稅義務人應於行為發生後30天內，向贈與人戶籍所在地之稅捐機關申報。"}, {"id": "fagui-ch3-022", "err": 41, "q": "依現行規定遺產及贈與稅法規定,遺產稅稅率最高課稅級距為?", "opts": ["10%", "15%", "20%", "30%"], "ans": 3, "exp": "依現行規定遺產及贈與稅法規定，遺產稅稅率最高課稅級距為20%。"}, {"id": "fagui-ch3-023", "err": 41, "q": "張三(被繼承人)育有4子,其⾧子較張三早死,當張三死亡可由其孫A、B代位其父繼承對張三之應繼分。如張三遺留保險金1,000萬元,則其孫各可代位繼承", "opts": ["125萬", "250萬", "300萬", "100萬"], "ans": 1, "exp": "張三之遺留保險金1000萬分給四個孩子(1人250萬)，而長子早死，其子A、B可代位繼承長子分得之財產，各可得125萬元。"}, {"id": "fagui-ch3-024", "err": 40, "q": "某甲㇐家投保人壽保險,全年所繳保費:某甲及其配偶合計為二萬四千元、成年⾧子二萬五千元、未成年次子㇐萬二千元,某甲於申報綜合所得稅時採用列舉扣除法,則㇐年可扣除的保險費為", "opts": ["八萬五千元", "八萬四千元", "六萬元", "六萬㇐千元"], "ans": 3, "exp": "每人每年保費列舉扣除上限為2.4萬元：本人與配偶合併視為一人，以2.4萬元為限；成年長子保費2.5萬元超過上限，只能扣2.4萬元；未成年次子保費1.2萬元未超過上限，全額扣除。合計24,000+24,000+12,000=60,000元。"}, {"id": "fagui-ch3-025", "err": 40, "q": "有關繼承的敘述何者正確?", "opts": ["繼父母與繼子女間為直系血親相互有繼承權", "父死母再嫁者,子女對其母喪失繼承權", "男子入贅妻家後喪失對父母之繼承權", "非婚生子女經準正後對其生父有繼承權"], "ans": 4, "exp": ""}, {"id": "fagui-ch3-026", "err": 40, "q": "依遺產及贈與稅法第17條規定,成年子女之扣除額應為_____萬元。", "opts": ["100", "123", "50", "40"], "ans": 4, "exp": "依遺產及贈與稅法第17條規定，成年子女之扣除額為40萬元。"}, {"id": "fagui-ch3-027", "err": 38, "q": "若保險契約涉及訴訟,要保人的住所不在中華民國境內時,其訴訟之管轄法院為_____地方法院為第㇐審管轄法院。", "opts": ["要保人以前住所", "保險公司所在地", "台北地區", "雙方契約約定"], "ans": 4, "exp": ""}, {"id": "fagui-ch3-028", "err": 38, "q": "繼承人拋棄繼承時,下列敘述何者錯誤?", "opts": ["須經法院同意", "須以書面呈報法院", "書面通知因其拋棄而應為繼承之人", "不繼承財產,亦不用負擔任何債務"], "ans": 1, "exp": "拋棄繼承為繼承人之單獨行為，只要程序完整，無須法院同意。"}, {"id": "fagui-ch3-029", "err": 37, "q": "依遺產及贈與稅法第17條規定,遺產稅扣除項目何者有誤?", "opts": ["配偶之扣除額為440萬元", "父母每人可扣除100萬元", "被繼承人之喪葬費用可扣除100萬元", "被繼承人死亡前,依法應那之各項稅捐、罰鍰、罰金及具有確實證明之未償債務可全額扣除"], "ans": 1, "exp": ""}, {"id": "fagui-ch3-030", "err": 37, "q": "依遺產及贈與稅法第17條規定,配偶之扣除額應為_____萬元。", "opts": ["400", "500", "350", "493"], "ans": 1, "exp": "依遺產及贈與稅法第17條規定，配偶之扣除額為400萬元。"}, {"id": "fagui-ch3-031", "err": 37, "q": "下列何者正確?", "opts": ["配偶相互贈與之財產應計入贈與總額", "贈與稅之納稅義務人死亡時,贈與稅尚未核課者,無須繳納贈與稅", "本國國民就其中華民國境外之財產為贈與,應課徵贈與稅", "以上皆非"], "ans": 3, "exp": "(1)配偶相互贈與之財產，不須計入贈與總額；(2)贈與稅之納稅義務人死亡時，贈與稅尚未核課者，須繳納贈與稅。"}, {"id": "fagui-ch3-032", "err": 36, "q": "按遺產及贈與稅法規定,約定被繼承人死亡時給付其所指定受益人之A.人壽保險之死亡保險金;B.勞工保險之死亡保險金;C.軍公教保險之死亡保險金;D.撫恤金;以上何者不計入遺產總額?", "opts": ["ABCD", "BD", "D", "ABC"], "ans": 4, "exp": ""}, {"id": "fagui-ch3-033", "err": 36, "q": "老王去年度共有3次贈與,贈與其子1棟房屋2,000萬元,贈與其妻轎車200萬元,贈與其女出嫁禮金80萬元,老王今年度課稅贈與總額為_____萬元", "opts": ["2,000", "2,280", "2,200", "2,080"], "ans": 1, "exp": "夫妻間之贈與不計入贈與總額；父母於子女婚嫁時所贈與之財物，總金額不超過100萬元也不計入。故課稅贈與總額為2,000萬元。"}, {"id": "fagui-ch3-034", "err": 35, "q": "關於遺產稅款之繳納方式有A.現金繳納;B.實物抵繳;C.分期繳納;D.部分現金繳納,部分實物㇐次抵繳", "opts": ["ABD", "AC", "ABC", "ABCD"], "ans": 4, "exp": ""}, {"id": "fagui-ch3-035", "err": 35, "q": "若保險金在死亡保險中未指定身故受益人之受領順序及比例時,又被保險人僅列有子女和配偶,則該保險金應如何分配?", "opts": ["配偶、子女各二分之㇐", "配偶三分之二、子女三分之㇐", "按人數平均分配", "配偶獨領"], "ans": 3, "exp": "若保險金在死亡保險中未指定身故受益人之受領順序及比例時，又被保險人僅列有子女和配偶，則該保險金按人數平均分配。"}, {"id": "fagui-ch3-036", "err": 34, "q": "依遺產及贈與稅法第12-1條規定,現行被繼承人之喪葬費用扣除額為_____元。", "opts": ["100萬", "50萬", "40萬", "138萬"], "ans": 4, "exp": "依遺產及贈與稅法第12-1條規定，現行被繼承人之喪葬費用扣除額為138萬元。"}, {"id": "fagui-ch3-037", "err": 34, "q": "有關拋棄繼承何者錯誤?", "opts": ["繼承人中㇐人拋棄,其應繼分歸屬於其他繼承人", "拋棄繼承無須開具遺產清冊但需書面呈報法院", "遺屬在知悉得繼承之時起3個月內表示,且不得申請延⾧", "屬單獨行為需經法院同意始生效"], "ans": 4, "exp": "拋棄繼承屬單獨行為，只要程序完整，無須法院同意。"}, {"id": "fagui-ch3-038", "err": 34, "q": "依民法第八條對失蹤人為死亡宣告之期限,何者正確?A.如遇特別災難於災難終了滿三年後;B.㇐般失蹤滿七年後;C.失蹤人為八十歲以上於失蹤滿㇐年後;D.得由利害關係人向檢察官聲請宣告", "opts": ["B", "BD", "ABCD", "ABC"], "ans": 1, "exp": "失蹤宣告：一般失蹤滿7年(B)；特別災難事故滿1年；80歲以上失蹤人滿3年；得由利害關係人或檢察官向法院（非檢察官）聲請死亡宣告。"}, {"id": "fagui-ch3-039", "err": 33, "q": "依遺產及贈與稅法第12-1條規定,被繼承人遺有父母者,父母每人扣除額為", "opts": ["100萬元", "138萬元", "400萬元", "445萬元"], "ans": 2, "exp": ""}, {"id": "fagui-ch3-040", "err": 33, "q": "對於特留分之敘述何者錯誤?", "opts": ["子女的特留分為其應繼分的二分之㇐", "兄弟姊妹的特留分為應繼分的三分之㇐", "父母的特留分為其應繼分的三分之㇐", "祖父母的特留分為其應繼分的三分之㇐"], "ans": 3, "exp": "父母的特留分為其應繼分的二分之一（非三分之一）。"}, {"id": "fagui-ch3-041", "err": 33, "q": "依民法規定第㇐順位繼承人全部拋棄繼承,由其次親等人辦理繼承者,稱為", "opts": ["代位繼承", "概括繼承", "共同繼承", "隔代繼承"], "ans": 4, "exp": "當所有第一順位繼承人全部拋棄繼承，由其直系血親卑親屬隔代繼承。"}, {"id": "fagui-ch3-042", "err": 33, "q": "A.謀求員工福利;B.為員工退休或退職提存準備金;C.減輕雇主責任;D.減免營利事業所得稅,上述何者是企業投保團體人壽保險之主要目的?", "opts": ["ABC", "ACD", "ABCD", "BCD"], "ans": 3, "exp": "企業投保團體壽險主要目的：謀求員工福利、為員工退休或退職提存準備金、防意外災變影響員工生活並減輕雇主責任、減免營利事業所得稅。"}, {"id": "fagui-ch3-043", "err": 31, "q": "有關贈與稅,何者陳述錯誤?", "opts": ["納稅義務人為贈與人", "免稅額之計算係指㇐年之贈與", "㇐年如有二次以上之贈與,不得分別計算", "免稅額為123萬元"], "ans": 4, "exp": "贈與他人每年免稅額為244萬元（非123萬元）。"}, {"id": "fagui-ch3-044", "err": 31, "q": "有關民法各順位繼承人之特留分之敘述,何者錯誤?", "opts": ["配偶的特留分是應繼分的二分之㇐", "祖父母的特留分是應繼分的三分之㇐", "父母的特留分是應繼分的二分之㇐", "兄弟姊妹的特留分是應繼分的二分之㇐"], "ans": 4, "exp": "兄弟姊妹特留分為應繼分的三分之一（非二分之一）。"}, {"id": "fagui-ch3-045", "err": 30, "q": "所得稅法規定符合㇐定條件的A.滿期保險金;B.醫療保險金;C.失能保險金;D.死亡保險金_____得免納所得稅。", "opts": ["ABC", "ABCD", "BD", "BCD"], "ans": 2, "exp": "所得稅法規定符合一定條件的滿期保險金、醫療保險金、失能保險金及死亡保險金得免納所得稅。"}]}, {"num": 4, "name": "保戶相關重要法律介紹", "questions": [{"id": "fagui-ch4-001", "err": 74, "q": "保險業核保理賠時需蒐集當事人之特種個資,除經當事人書面同意外,須符合法律明文規定使得為之,下列何者為保險業蒐集之特種個資?A.健康檢查;B.病歷;C.指紋;D.職業", "opts": ["ABD", "BC", "AB", "ABC"], "ans": 3, "exp": ""}, {"id": "fagui-ch4-002", "err": 69, "q": "有關金融消費者保護法規定,何者有誤?A.金融服務業對金融消費者之責任得預先約定限制;B.金融服務業對金融消費者之責任不得預先免除;C.違反預先限制之約定無效;D.金融服務業與金融消費者訂立契約條款顯失公平者契約無效", "opts": ["BCD", "A", "AD", "BC"], "ans": 3, "exp": "A金融服務業對金融消費者之責任，不得預先約定限制或免除；D金融服務業與金融消費者訂立契約條款顯失公平者，該部分條款無效。"}, {"id": "fagui-ch4-003", "err": 66, "q": "何者符合保險業務人員酬金制度應遵行原則?", "opts": ["酬金制度為使業績順利達成,於保單成立後全數發放以資鼓勵", "保單如發生契約撤銷,保險公司得依規定向業務員追回已發放之酬金", "業務員離職金應依據已實現之績效予以訂定", "酬金應經核保部審慎評估,並考量其與附加費用率之關係"], "ans": 3, "exp": ""}, {"id": "fagui-ch4-004", "err": 64, "q": "金管會列舉保險業常見之低風險交易情境,_____投保A.微型保險;B.具有保單價值準備金之保險商品;C.團體年金保險;D.客戶無高洗錢及資恐風險之表徵,年繳保費未逾三萬元_____,保險公司得進行簡化審查及持續監控措施。", "opts": ["ABC", "AC", "ABCD", "ACD"], "ans": 4, "exp": "金管會列舉保險業常見之低風險交易情境，如：客戶投保不具有保單價值準備金之保險商品、微型保險、小額終老保險、團體年金/定期/傷害/健康/醫療保險，客戶無高洗錢及資恐風險之表徵，年繳保費未逾三萬元/躉繳未逾七萬五千元，保險公司得進行簡化審查及持續監控措施。"}, {"id": "fagui-ch4-005", "err": 64, "q": "保戶填寫要保書聲明同意保險人依個資法取得相關資料,即符合非公務機關於蒐集個資時,除符合特定目的外,亦符合A.法律明文規定;B.與當事人有契約關係且已採取適當安全措施;C.經當事人同意;D.為增進公共利益所必要", "opts": ["AB", "AD", "ABCD", "BC"], "ans": 3, "exp": ""}, {"id": "fagui-ch4-006", "err": 57, "q": "有關金融機構確認客戶身分程序之敘述何者錯誤?", "opts": ["應以風險為基礎", "留存確認客戶身分之程序資料,應自業務開始時起至少保存五年", "審查範圍擴及實質受益人", "臨時交易者留存確認程序之資料,應自臨時性交易終止時起至少保存五年"], "ans": 2, "exp": ""}, {"id": "fagui-ch4-007", "err": 54, "q": "業務員因銷售保險商品逕向要保人所蒐集之資料,下列敘述何者正確?", "opts": ["若依法律規定得免告知者,得免為告知", "法律雖有規定但基於保護消費者,皆需為告知,不得免除", "不需告知要保人使用目的", "屬公務機關之資料蒐集"], "ans": 1, "exp": ""}, {"id": "fagui-ch4-008", "err": 51, "q": "對於疑似洗錢之交易,受理洗錢防制通報的機構為?", "opts": ["法務部調查局", "法務部", "金管會", "經濟犯罪防制中心"], "ans": 1, "exp": ""}, {"id": "fagui-ch4-009", "err": 45, "q": "非公務機關在蒐集個人資料時,除了須符合特定目的外,尚須具有下列何種情形之㇐始得為之?A.經當事人同意;B.當事人自行公開或其他已合法公開之個人資料;C.對當事人權益無侵害;D.為增進公共利益所必要", "opts": ["ABD", "AB", "ABC", "ABCD"], "ans": 4, "exp": ""}, {"id": "fagui-ch4-010", "err": 43, "q": "依金消法規定,金融服務業包括A.期貨業;B.保險業;C.證券交易所;D.證券集中保管事業", "opts": ["AB", "ABCD", "BCD", "ABC"], "ans": 1, "exp": "金融服務業包括：銀行業、證券業、期貨業、保險業、電子票證業及其他經主管機關公告之金融服務業；但不包括證交所、櫃買中心、集保事業、期交所等。"}, {"id": "fagui-ch4-011", "err": 39, "q": "依消保法規定,企業經營者與消費者訂立定型化契約前,應提供多久之合理期間以審閱全部條款?", "opts": ["10日內", "7日內", "15日內", "30日內"], "ans": 4, "exp": "企業經營者與消費者訂立之一般消費定型化契約，應提供消費者30日內的合理期間，以審閱全部條款。"}, {"id": "fagui-ch4-012", "err": 39, "q": "依據金消法規定,金融消費者係指接受金融服務業提供金融商品或服務,但不包含A.專業投資機構;B.符合㇐定財力之自然人;C.㇐般消費者;D.專業能力之自然人", "opts": ["AD", "ABCD", "BCD", "ABD"], "ans": 4, "exp": "金融消費者指接受金融服務業提供金融商品或服務者，但不包括：專業投資機構、符合一定財力或專業能力之自然人或法人。"}, {"id": "fagui-ch4-013", "err": 38, "q": "何者屬於金融服務業公平待客原則之指標?A.業務人員專業性原則;B.廣告招攬真實原則;C.申訴優先處理原則;D.商品或服務適合度原則;E酬金與業績衡平原則", "opts": ["ABD", "ABCDE", "BCD", "ABDE"], "ans": 4, "exp": "金融服務業公平待客原則之指標包括：訂約公平誠信、注意與忠實義務、廣告招攬真實、商品或服務適合度、告知與揭露、複雜性高風險商品、酬金與業績衡平、申訴保障、業務人員專業性、友善服務、誠信經營等原則。"}, {"id": "fagui-ch4-014", "err": 37, "q": "金融消費評議中心受理消費者申訴後,會先將案件移交受申訴之金融服務業處理,金融服務業應於收到申訴之日起_____內為適當之處理,並將處理結果回覆消費者。", "opts": ["30日", "60日", "10日", "15日"], "ans": 1, "exp": "金融服務業應於收到申訴之日起30日內為適當之處理，並將處理結果回覆消費者。"}, {"id": "fagui-ch4-015", "err": 36, "q": "對於疑似洗錢之交易,金融機構必須確認客戶身分及留存客戶之交易紀錄,並應向指定之機構申報,該通報之受理機構為", "opts": ["金管會保險局", "法務部調查局", "金融情報中心", "經濟犯罪防制中心"], "ans": 2, "exp": ""}, {"id": "fagui-ch4-016", "err": 33, "q": "依洗錢防制法規定金融機構對於㇐定金額以上通貨交易,應確認客戶身分及留存客戶之交易紀錄,並向指定機構申報所稱㇐定金額,係指新台幣_____以上。", "opts": ["二百萬", "㇐百萬", "五十萬", "二百五十萬"], "ans": 3, "exp": "金融機構或人員對於達新台幣50萬元以上(或等值外幣)之通貨交易，應向法務部調查局申報。"}, {"id": "fagui-ch4-017", "err": 32, "q": "下列何者為洗錢防制法適用之非金融事業或人員?A.會計師;B.地政士;C.銀樓業;D.不動產經紀業", "opts": ["BCD", "ABCD", "CD", "ABC"], "ans": 2, "exp": "非金融機構或人員包括：銀樓業、地政士、不動產經紀業（從事不動產買賣交易有關行為）；律師、公證人、會計師（為客戶準備或進行特定交易時）等。"}]}, {"num": 5, "name": "保險業務員管理規則的認識", "questions": [{"id": "fagui-ch5-001", "err": 73, "q": "業務員得依保險業務員管理規則規定申請覆核的項目有?A第7條註銷登錄或不予登錄之情事;B第13條撤銷登錄之情事;C第19條第1項各款情事之㇐予以停止招攬之情事;D第19條第3項撤銷登錄之情事", "opts": ["CD", "ABC", "BD", "BCD"], "ans": 1, "exp": ""}, {"id": "fagui-ch5-002", "err": 70, "q": "業務員何時須先辦理再登錄始得招攬?A.受處分公司依管理規則第19條第1項停止招攬處分期間屆滿後;B.受處分公司撤銷登錄後;C.從原公司辦理註銷登錄後轉任其他公司時;D.取得投資型測驗合格後欲招攬投資型保險商品時", "opts": ["ABD", "AC", "ABC", "ACD"], "ans": 2, "exp": "再登錄情形：1.業務員經註銷登錄後，轉任其他公司或離職再任職原所屬公司，重新辦理登錄者；2.受經營同類保險業務之停止招攬處分期間屆滿後，重 , "ans": 2, "exp": ""}]}]}, {"subject": "保險實務", "subjectKey": "shiwu", "officialQuestions": 50, "officialMinutes": 60, "chapters": [{"num": 1, "name": "風險管理與保險", "questions": [{"id": "shiwu-ch1-001", "err": 61, "q": "下列何者正確?A.主觀風險可能經過㇐定期間觀察與統計而成為客觀風險;B.風險依損失是否可衡量區分為投機風險與純粹風險;C.保險可保的純粹風險僅人身上的風險及財產上的風險兩種;D.特定風險在性質上常屬於純粹風險", "opts": ["ACD", "ABCD", "AD", "BCD"], "ans": 3, "exp": "B風險依損失可否衡量，區分為客觀風險與主觀風險；C保險可保的純粹風險：人身上的風險、財產上的風險、責任上的風險。"}, {"id": "shiwu-ch1-002", "err": 50, "q": "下列何者正確?", "opts": ["損失幅度分配低的風險可能屬於不重要的風險或重要的風險", "損失幅度分配低的風險可能屬於特別嚴重的風險或不重要的風險", "損失頻率分配高的風險可能屬於不重要的風險或重要的風險", "以上皆非"], "ans": 1, "exp": "依損失幅度與頻率可分為：特別嚴重風險(頻率與幅度皆高)、重要的風險(頻率高幅度低，或頻率低幅度高)、不重要風險(頻率與幅度皆低)。"}, {"id": "shiwu-ch1-003", "err": 49, "q": "人身風險事故發生時可能導致:A.遺族生活費用增加;B.老年退休費用減少;C.醫療費用增加;D.收入減少", "opts": ["ACD", "ABCD", "ABC", "BCD"], "ans": 1, "exp": ""}, {"id": "shiwu-ch1-004", "err": 46, "q": "道德風險因素之敘述何者正確?A.屬於無形風險因素;B.指因個人不小心、冷漠導致增加風險事故發生的機會;C.如為領保險金而縱火的行為;D.如疏忽維護已投保財產保險之保險標的物", "opts": ["AC", "BC", "BD", "C"], "ans": 1, "exp": ""}, {"id": "shiwu-ch1-005", "err": 42, "q": "某㇐團體之員工年平均死亡率為0.00326,若死亡事故發生時,雇主預期須支付每位員工100萬元的撫卹金,則雇主對每㇐位員工之損失成本為:100萬元x326÷100,000=3,260元;下列何者正確?", "opts": ["雇主預測損失成本係應用主觀風險的觀念", "0.00326即損失幅度的預期值", "雇主應評估本身足以消納或化解損失之財力,以作為風險管理決策之參考", "以上皆是"], "ans": 3, "exp": ""}, {"id": "shiwu-ch1-006", "err": 40, "q": "天然災害如地震不屬於下列何種風險分類?", "opts": ["純粹風險", "靜態風險", "特定風險", "客觀風險"], "ans": 3, "exp": "天然災害/自然風險事故(如地震、海嘯)的風險類別為客觀、純粹、靜態、基本風險。"}, {"id": "shiwu-ch1-007", "err": 36, "q": "風險衡量結果屬於重要的風險,則代表", "opts": ["損失頻率分配及幅度分配皆很小", "損失頻率分配及幅度分配皆很高", "損失頻率分配很高及幅度分配很小", "以上皆非"], "ans": 3, "exp": "重要的風險：損失頻率分配很高及幅度分配很小的屬性。"}, {"id": "shiwu-ch1-008", "err": 31, "q": "某㇐團體之員工年平均死亡率為0.00326,若死亡事故發生時,雇主預期須支付每位員工100萬元的撫卹金,下列何者正確?", "opts": ["0.00326即損失幅度的預期值", "雇主對每㇐位員工之損失成本為32,600元", "雇主應評估本身足以消納或化解損失之財力,以作為風險管理決策之參考", "雇主預測損失成本係應用主觀風險的觀念"], "ans": 3, "exp": ""}]}, {"num": 2, "name": "人身保險的意義與功能", "questions": [{"id": "shiwu-ch2-001", "err": 67, "q": "廣義的風險管理,除彌補經濟損失外,尚包含儲蓄投資以備未來所需,此部份之需求就可以利用年金保險、⾧期壽險等具有下列哪些功能,使個人及家庭的經濟生活更能獲得保障?A.儲蓄性質保單;B.保單借款;C.保單復效;D.身故保險金", "opts": ["BC", "AD", "AB", "ABCD"], "ans": 3, "exp": "保險的儲蓄功能，故選項只能選擇A與B；C復效係保障的持續擁有；D身故保險金保障家庭經濟生活並未保障個人經濟生活。"}, {"id": "shiwu-ch2-002", "err": 50, "q": "下列有關保險之陳述,何者正確:", "opts": ["是㇐種透過多數人合作以避免風險的經濟保障制度", "為風險避免方法之㇐種", "投保人壽保險的人可以確定他的信用和償還能力", "以上皆是"], "ans": 3, "exp": ""}, {"id": "shiwu-ch2-003", "err": 50, "q": "㇐個投保人壽保險的人,不論在任何意外事故發生時都有經濟上的保障,這也就是人身保險功能中的", "opts": ["後顧無憂,晚景可恃", "保證信用,有利投資", "安定就業,穩定發展", "以上皆是"], "ans": 2, "exp": "不論在任何意外事故發生時都有經濟上的保障，也就確定了信用和償債能力，保險費中的責任準備金，除了是儲蓄，也是有利的投資。"}, {"id": "shiwu-ch2-004", "err": 48, "q": "有關人壽保險生命表之敘述何者正確?A.生命表又稱為死亡率表;B.生命表係利用收支平等原則統計出來的;C.生命表作為人壽保險計算純保費的根據;D.最早依據生命表科學計算保險費的機構是英國倫敦的衡平保險社", "opts": ["ABCD", "BCD", "ACD", "ABC"], "ans": 3, "exp": "B生命表係利用大數法則統計出來的，就某團體的死亡率，加以統計列成表。收支平等原則：全體保戶繳入的保費總額=公司支付給全體受益人的保險金總額。"}, {"id": "shiwu-ch2-005", "err": 47, "q": "人身保險對個人的功能有哪些?A.安定就業、穩定發展;B.享受優惠、稅捐減免;C.保險理財,㇐舉兩得;D.鼓勵儲蓄,平均財富", "opts": ["BCD", "ABC", "ACD", "ABCD"], "ans": 2, "exp": "人身保險對個人的功能：後顧無憂晚景可恃、安定就業穩定發展、保證信用有利投資、享受優惠稅捐減免、保險理財一舉兩得。D(鼓勵儲蓄平均財富)是對社會的功能。"}, {"id": "shiwu-ch2-006", "err": 41, "q": "人身保險對國家有哪些功能?A.透過再保、拓展外交;B.互助共濟、社會安寧;C.健全經營、整合金融;D.形成資本、以增國富", "opts": ["ACD", "ABCD", "BCD", "ABC"], "ans": 1, "exp": "人身保險對國家的功能：形成資本以增國富、穩定經濟安定政治、透過再保拓展外交、健全經營整合金融。B(互助共濟社會安寧)是對社會的功能。"}]}, {"num": 3, "name": "我國人身保險事業的基本認識", "questions": [{"id": "shiwu-ch3-001", "err": 69, "q": "有關金融科技創新及大數據應用何者正確?A.科技業者透過法律許可方式進行沙盒實驗不會受到既有法律追訴;B.為落實業務員親晤保戶取得其親簽要保文件,可透過保戶證件掃描搭配生物辨識判別其真實身分;C.透過數據分析協助保險公司統㇐將消費客群導向㇐致性業務模式;D.結合科技可設計外溢效果之保險商品,藉以改變要保人的生活作息", "opts": ["AB", "CD", "ABCD", "ABD"], "ans": 1, "exp": "C透過數據分析協助保險公司細分消費客群，導向更精準的業務模式；D結合科技可設計外溢效果之保險商品，藉以改變被保險人的生活作息。"}, {"id": "shiwu-ch3-002", "err": 68, "q": "何者有助於商品創新?A.主管機關修正新形態商品認定標準,就部分保險商品改採核准制以縮短新商品審核流程;B.運用數據解析人口老化及消費習慣改變以細分客群;C.運用區塊鏈技術共享資料建立標準流程;D.改進經營技術", "opts": ["ABCD", "BCD", "ABC", "BC"], "ans": 2, "exp": "主管機關修正新形態商品認定標準，就部分保險商品改採「備查」而非「核准」，藉以縮短商品審核流程。"}, {"id": "shiwu-ch3-003", "err": 50, "q": "台灣地區目前正面臨老年問題發生,所以下列哪些商品成為老年人口的重要需求?A.⾧年期的健康保險;B.⾧期照顧保險;C.年金保險;D.定期壽險", "opts": ["ABC", "BC", "AB", "ABCD"], "ans": 1, "exp": "老年生活費的準備應該以「在工作期間自作準備」及「個人自我累積養老年金」為原則，故選長年期健康保險、長期照顧保險、年金保險，以防因退休或疾病致沒有收入的窘境。"}, {"id": "shiwu-ch3-004", "err": 42, "q": "有關外溢效果保單的特色,何者錯誤?", "opts": ["保險公司為掌握保戶生活習慣及取得相關醫療數據,需精進大數據分析", "商品設計有實物給付型與非實物給付型", "保險公司須強化資訊安全之風險控管,以免保戶個資外洩", "保險費計算係採總體考量,保費更公平合理,且能引導保戶規避風險,降低整體社會需求"], "ans": 4, "exp": ""}, {"id": "shiwu-ch3-005", "err": 41, "q": "壽險公司為改善經營技術、培養專業人員以適應市場發展趨向,有關公司努力發展之重點何者為非?", "opts": ["經客戶同意透過業務員以行動裝置輸入客戶投保資料,以電子文件替代紙本要保書及相關文件與保險公司締結契約", "運用區塊鏈技術簡化理賠調查,快速支付理賠以服務客戶", "壽險市場已具備專業人員生存要件,行銷技術將施以個別化的教育訓練以提高行銷效果", "設計更符合客戶需要商品,加強創新及多樣化商品設計"], "ans": 3, "exp": "壽險市場已具備專業人員生存要件，行銷技術將施以「系統化」的教育訓練以提高行銷效果（非個別化）。"}, {"id": "shiwu-ch3-006", "err": 40, "q": "下列何者符合主管機關對於保障型及高齡化保險商品之定義?A.小額終老保險;B.無保單價值準備金之人身保險;C.進入年金給付期間且約定採分期給付的遞延年金保險;D.即期年金保險", "opts": ["ACD", "ABD", "AD", "ABCD"], "ans": 4, "exp": "保障型及高齡化保險商品的認定標準共四大類：即期年金保險、進入年金給付期間且約定採分期給付的遞延年金保險、小額終老保險、無保單價值準備金之人身保險，以上四項皆屬於此認定範圍。"}, {"id": "shiwu-ch3-007", "err": 39, "q": "下列何者錯誤?", "opts": ["業務員行銷時應先強調保障型商品之重要性", "壽險業利用金融科技的目的係為完全取代人的服務以利提升經營效率", "壽險業應動態配置資產以因應低利率環境", "壽險業應加強增員及業務員教育訓練,防止業務員發生休勤現象"], "ans": 2, "exp": "金融科技的目的並非取代「人」的服務，而是善用科技從客戶體驗出發，先滿足客戶需求，再創造新需求。"}, {"id": "shiwu-ch3-008", "err": 36, "q": "壽險業總公司下的業務部,通常掌理哪些事項?A.契約調查;B.財務管理;C.人員監督管理;D.承保理賠", "opts": ["ABCD", "C", "ABD", "AD"], "ans": 4, "exp": "業務部：掌理承保理賠、保費、分保、契約調查及分支機構有關業務事項。"}, {"id": "shiwu-ch3-009", "err": 33, "q": "透過數據分析即金融科技技術的提升,可以協助保險業", "opts": ["業務模式更複雜", "創造差異化提升競爭力", "概括消費群", "以上皆是"], "ans": 2, "exp": "數據分析即金融科技技術的提升，可使業務模式更加簡化、協助細分消費客群，導向更精準的業務模式。"}, {"id": "shiwu-ch3-010", "err": 32, "q": "保險業可以運用大數據技術,透過哪些方式建立標準化之服務流程?A.區塊鏈結合智能合約;B.開發保險經營自動化系統;C.精簡保單作業流程;D.監理沙盒實驗", "opts": ["AB", "ABC", "ABCD", "CD"], "ans": 2, "exp": "現行保險業因金融創新發展及大數據技術之應用，可透過區塊鏈結合智能合約、精簡保單作業流程，以及開發保險經營自動化系統，從定價、核保到理賠都能自動化，建立標準化且錯誤率極小的服務流程。"}]}, {"num": 4, "name": "人身保險的構造", "questions": [{"id": "shiwu-ch4-001", "err": 70, "q": "經驗生命表編製的目的為?A.確定被保險人的死亡機率;B.提存責任準備金的基礎;C.使壽險業者能公平、合理地釐訂費率;D.計算解約金的基礎", "opts": ["ABC", "BD", "BC", "BCD"], "ans": 3, "exp": "經驗生命表編製的目的：應為壽險業釐訂保險費率、計算責任準備金、評價業務營運績效之準繩。"}, {"id": "shiwu-ch4-002", "err": 66, "q": "利率變動型年金在累積期間,保險公司依據要保人交付之保險費,減去附加費用後,依何種利率計算年金保單價值準備金?", "opts": ["預定利率", "宣告利率", "定存利率", "以上皆是"], "ans": 2, "exp": "累積期間，保險公司依據要保人交付之保險費，減去附加費用後，依宣告利率計算年金保單價值準備金。"}, {"id": "shiwu-ch4-003", "err": 61, "q": "有關分紅保險契約之敘述何者錯誤?", "opts": ["契約條文應明訂分紅方式及紅利決算基準日", "以紅利購買增額繳清保險的部分,保險公司得依實際狀況決定分紅與否", "變更為減額繳清保險後應維持其分紅保單之特性", "變更為展期定期保險後應維持其分紅保單之特性"], "ans": 4, "exp": "分紅保險契約變更成展期定期保險後，得由各保險公司依實際狀況決定分紅或不分紅保單（不須維持分紅特性）。"}, {"id": "shiwu-ch4-004", "err": 57, "q": "有關分紅保單分紅方式與發放年度皆應於保單條款充分揭露,以下敘述何者錯誤?", "opts": ["如遇復效者,當年度經過期間是否分配紅利由保險公司自訂", "第㇐次保單紅利發放保單年度,得由保險公司依商品特性訂定", "如遇失效或解約者,各保單年度是否分配紅利由保險公司自訂", "如遇被保險人身故,當年度是否分配紅利得由保險公司自行決定"], "ans": 1, "exp": "分紅保單契約復效者，至少應依當年度經過期間比例給付紅利（並非由保險公司自訂）；契約失效或解約者，其各保單年度是否分配紅利才是由保險公司自訂，均應於保單條款揭露。"}, {"id": "shiwu-ch4-005", "err": 56, "q": "有關解約金敘述何者正確?A.躉繳保單之解約金等於保單價值準備金;B.分期繳費保單繳費期滿後之解約金等於保單價值準備金;C.躉繳保單之解約金小於保單價值準備金;D.分期繳費保單繳費期滿後之解約金小於保單價值準備金", "opts": ["BC", "AB", "AD", "CD"], "ans": 2, "exp": "躉繳保單之解約金等於保單價值準備金；分期繳費保單繳費期滿後之解約金也等於保單價值準備金。"}, {"id": "shiwu-ch4-006", "err": 51, "q": "利率變動型年金與利率固定型年金保險商品之敘述,何者為非?", "opts": ["利率變動型年金及利率固定型年金保費繳納皆可躉繳、非躉繳,惟利率固定型年金非躉繳為定期定額", "利率變動型年金附加費用由公司自行訂定,利率固定型年金附加費用依繳費期間介於5%-11%", "利率變動型年金身故保障為解約金,利率固定型年金身故保障為保單價值準備金", "利率變動型年金採固定或變動金額年金給付,利率固定型年金採固定金額年金給付"], "ans": 3, "exp": ""}, {"id": "shiwu-ch4-007", "err": 49, "q": "有關人壽保險業經驗生命表,係為下列何者之準繩?A.壽險業計算責任準備金;B.壽險業釐訂保險費率;C.壽險業評價業務營運績效", "opts": ["AB", "B", "A", "ABC"], "ans": 4, "exp": "人壽保險業經驗生命表，係以壽險業釐訂保險費率、計算責任準備金、評價業務營運績效為準繩。"}, {"id": "shiwu-ch4-008", "err": 49, "q": "依現行保險業各種責任準備金提存辦法規定,保險期間超過㇐年之人壽保險契約中,有關利率變動型人壽保險其最低責任準備金之提存採", "opts": ["20年滿期生死合險修正制", "25年滿期生死合險修正制", "20年繳費終身保險修正制", "由主管機關另定之"], "ans": 4, "exp": ""}, {"id": "shiwu-ch4-009", "err": 48, "q": "有關定期保險敘述何者正確?A.其他因素不變,保險費與死亡率高低成正比;B.其他因素不變,保險費與利率高低成正比;C.其他因素不變,保險費與費用率高低成正比;D.其他因素不變,保險費與利率高低成反比", "opts": ["ABC", "ACD", "BC", "AD"], "ans": 2, "exp": "預定死亡率及預定附加費用率與保險費成正比；預定利率與保險費成反比。"}, {"id": "shiwu-ch4-010", "err": 48, "q": "以往傳統型壽險保單皆屬強制分紅,主要是根據利差、死差做為分紅金額之計算基礎,在此基礎下其強制分紅之標準為何?", "opts": ["只要出現利差損或死差損就必須分紅", "同時出現利差益及死差益才分紅", "僅出現死差益,即使有利差損也必須分紅", "以上皆非"], "ans": 3, "exp": "以往傳統型壽險保單屬強制分紅，若僅出現死差益，即使有利差損也必須分紅。"}, {"id": "shiwu-ch4-011", "err": 47, "q": "利率固定型年金保險商品的繳費方式有A.躉繳;B.非躉繳(定期定額);C.非躉繳(不定期不定額)", "opts": ["BC", "ABC", "AB", "AC"], "ans": 3, "exp": "利率固定型年金保險商品的繳費方式有躉繳及非躉繳(定期定額)。"}, {"id": "shiwu-ch4-012", "err": 45, "q": "用來作為計算將來要支付死亡保險金的保險費基礎是", "opts": ["預定死亡率", "預定利率", "預定營業費用", "以上皆是"], "ans": 1, "exp": "預定死亡率：為計算將來要支付死亡保險金的保險費基礎。"}, {"id": "shiwu-ch4-013", "err": 44, "q": "有關生命表敘述何者正確?A.又稱為死亡率表;B.係利用大數法則統計計算保險費;C.友愛社是最早根據生命表合理計算保險費的組織;D.通常採用1百萬人為統計對象", "opts": ["ACD", "AB", "ABCD", "BC"], "ans": 2, "exp": "「衡平保險社」（非友愛社）是首先根據生命表，按年齡及身體健康狀況計算合理保險費的組織；通常採用10萬人（非1百萬人）為統計對象。"}, {"id": "shiwu-ch4-014", "err": 43, "q": "利率變動型年金甲型於給付期間,保戶可領取之年金金額與下列何者有關?A.預定死亡率;B.預定附加費用率;C.預定利率;D.宣告利率", "opts": ["AC", "AB", "AD", "ABC"], "ans": 1, "exp": "利率變動型年金甲型於給付期間，是以預定死亡率、預定利率來換算定額年金。"}, {"id": "shiwu-ch4-015", "err": 43, "q": "為了促進人身保險制度能夠健全營運,就必須顧及下列哪幾項要素?A.相互扶助的觀念;B.公平的危險分擔;C.收支相等原則;D.損失填補原則", "opts": ["ABC", "AC", "BC", "ABCD"], "ans": 1, "exp": "為了促進人身保險制度能健全營運，必須兼顧三大原則：相互扶助的觀念、公平的危險分擔、收支相等原則。損害填補原則只適用實支實付健康險。"}, {"id": "shiwu-ch4-016", "err": 42, "q": "決定壽險商品價格時,須兼顧哪些原則?A.相互扶助的觀念;B.公平的危險分擔;C.收支相等原則;D.利潤最大化原則", "opts": ["ABC", "BCD", "ACD", "ABCD"], "ans": 1, "exp": "決定壽險商品價格須兼顧：相互扶助的觀念、公平的危險分擔、收支相等原則（非利潤最大化）。"}, {"id": "shiwu-ch4-017", "err": 40, "q": "利率變動型年金計算責任準備金之預定危險發生率,自民國101年7月1日起以下列何者死亡率為計算基礎?", "opts": ["臺灣壽險業第二回年金生命表之90%", "臺灣壽險業第二回年金生命表之100%", "臺灣壽險業第㇐回年金生命表之100%", "臺灣壽險業第㇐回年金生命表之90%"], "ans": 2, "exp": "利率變動型年金計算責任準備金之預定危險發生率，自民國101年7月1日起以台灣壽險業第二回年金生命表為基礎，由各公司自行訂定。"}, {"id": "shiwu-ch4-018", "err": 40, "q": "下列敘述何者為是?", "opts": ["生存機率與死亡機率間無任何關係", "因同㇐時點某人的生存機率等於1減死亡機率,所以年金生命表可以依據目前壽險業界所採的經驗表去推算", "在同㇐時點下,某人之死亡與生存是互斥的", "在同㇐時點下,某人之生存機率與死亡機率之合會小於1"], "ans": 3, "exp": "生存機率與死亡機率相加為1；年金生命表是依據預定危險發生率訂定。"}, {"id": "shiwu-ch4-019", "err": 40, "q": "保險公司對於責任準備金之提存方式往往採取較穩健的作法,採比保單價值準備金A.較低之預定利率;B.較高之預定利率;C.較低之預定死亡率;D.較高之預定死亡率", "opts": ["BC", "BD", "AD", "AC"], "ans": 3, "exp": ""}, {"id": "shiwu-ch4-020", "err": 38, "q": "依生命表顯示30歲女性死亡率是千分之三,若有㇐千名30歲女性各投保2千萬㇐年期的死亡保險,則:A.每位女性保費是由投保人比例負擔為每人6萬;B.每人應收保費係依據收支相等原則來計算;C.保險入應支出的死亡保險金額總計為6千萬;D.㇐年間死亡人數為6人", "opts": ["ABC", "BC", "BD", "AC"], "ans": 1, "exp": "每人保費6000萬÷1000人=6萬；每年死亡保險金額2,000萬X一年間死亡人數(1,000人X0.003)=6,000萬；死亡率會因性別、職業、健康狀況、體格有所影響，並非絕對人數。"}, {"id": "shiwu-ch4-021", "err": 36, "q": "自民國92年起壽險業銷售之分紅保單,保單分紅的依據", "opts": ["死差益", "利差紅利", "該險經營損益", "費差益"], "ans": 3, "exp": "民國92年起壽險業銷售之分紅保單，保單分紅依據為該險經營損益。"}, {"id": "shiwu-ch4-022", "err": 35, "q": "依主管機關核定,自民國81保單年度起,每㇐保單年度終了應分配當年度保單紅利係指下列哪幾項之和?A.利差紅利;B.費差紅利;C.死差紅利", "opts": ["ABC", "AC", "BC", "AB"], "ans": 2, "exp": "民國81保單年度起，每一保單年度終了應分配當年度保單紅利係利差紅利及死差紅利2項之和。"}, {"id": "shiwu-ch4-023", "err": 35, "q": "年金給付開始日為民國94年以前之利率變動型年金保險,下列何者可能被引用作為計算保險費之基礎?", "opts": ["年金生命表死亡率之90%", "年金生命表死亡率之130%", "年金生命表死亡率之110%", "年金生命表死亡率之70%"], "ans": 3, "exp": "94年以前以年金生命表死亡率之100%-120%為基礎。"}, {"id": "shiwu-ch4-024", "err": 35, "q": "利率變動型年金保險費的計算基礎包括:A.預定危險發生率;B.預定附加費用率;C.宣告利率;D.通貨膨脹率", "opts": ["ABC", "AB", "ABD", "BC"], "ans": 1, "exp": "利率變動型年金保險費的計算基礎為預定危險發生率、宣告利率、預定利率、預定附加費用率。"}, {"id": "shiwu-ch4-025", "err": 35, "q": "人身保險業自92年元月起銷售之人壽保險單,計算保險費率之生命表為", "opts": ["臺灣壽險業第三回經驗生命表死亡率百分之九十", "以調降保險費率至90%計之", "得自行決定", "臺灣壽險業第三回經驗生命表"], "ans": 3, "exp": "民國92年財政部為推動保險商品費率自由化，同意壽險業可自行決定計算保險費率的生命表。"}, {"id": "shiwu-ch4-026", "err": 36, "q": "自民國94年1月1日起至101年6月30日銷售之傳統年金保險計算保險費之預定危險發生率,採用之年金生命表以死亡率多少為基礎?", "opts": ["80%~100%", "90%", "100%~120%", "由各公司依主管機關規定自行訂定"], "ans": 4, "exp": "自民國94年1月1日起至101年6月30日銷售之傳統年金保險計算保險費之預定危險發生率，是以年金生命表為基礎，由各公司自行決定。"}, {"id": "shiwu-ch4-027", "err": 34, "q": "利率變動型年金甲型在給付期間之責任準備金係以年金金額之預定利率與依『新契約責任準備金利率採自動調整精算公式』計算之利率_____計算。", "opts": ["最小值", "平均值", "最大值", "以上皆可"], "ans": 1, "exp": "甲型：給付期間之責任準備金係以年金金額之預定利率與依『新契約責任準備金利率採自動調整精算公式』計算之利率，兩者之最小值；乙型：依當時預定利率為準。"}, {"id": "shiwu-ch4-028", "err": 34, "q": "利率變動型年金躉繳者附加費用率不得超過總保費之", "opts": ["5%", "8.5", "由公司自行訂定", "10%"], "ans": 3, "exp": "利率變動型年金躉繳者附加費用率由公司自行訂定。"}, {"id": "shiwu-ch4-029", "err": 32, "q": "自民國94年1月1日起至101年6月30日銷售之傳統年金保險應提存最低責任準備金之預定危險發生率,以年金生命表死亡率之_____為基礎", "opts": ["90%", "110%", "120%", "100%"], "ans": 1, "exp": ""}, {"id": "shiwu-ch4-030", "err": 31, "q": "首度將台灣壽險業經驗生命表區分為男、女性,並於民國78年6月奉准採用作為責任準備金提存標準的是台灣壽險業", "opts": ["第四回經驗生命表", "第五回經驗生命表", "第三回經驗生命表", "第二回經驗生命表"], "ans": 3, "exp": "民國78年6月奉准採用作為責任準備金提存標準的是台灣壽險業第三回經驗生命表。"}, {"id": "shiwu-ch4-031", "err": 31, "q": "利率變動型年金甲型在年金給付開始時,以當時之_____換算定額年金。", "opts": ["預定利率", "年金生命表", "年齡", "以上皆是"], "ans": 4, "exp": "利率變動型年金甲型：年金給付開始時，以當時之年齡、預定利率、年金生命表換算定額年金。"}, {"id": "shiwu-ch4-032", "err": 30, "q": "保戶投保壽險付足多久以上保費或繳費累積達有保單價值準備金時,因故中止解約時應償付解約金?", "opts": ["半年", "二年", "僅限躉繳方式", "㇐年"], "ans": 4, "exp": "保戶投保壽險已付足1年以上保險費或繳費累積達有保單價值準備金時，因故中止解約時，保險公司應於接到通知後1個月內償付解約金。"}]}, {"num": 5, "name": "人身保險的種類", "questions": [{"id": "shiwu-ch5-001", "err": 68, "q": "外溢效果的保險,在人身保險現行商品之設計有哪些方式?A.保戶自主健康管理;B.保險公司提供抵減保險費;C.保戶依保險公司要求使用穿戴型裝置即可領得健康促進獎勵金;D.目前僅有實物給付型商品", "opts": ["BC", "ABC", "AB", "ABCD"], "ans": 3, "exp": "若保戶身體健康檢查程度或利用穿戴裝置達到一定標準，保單啟動未來保費減費；目前設計有實物給付型及非實物給付型2種(D錯)。"}, {"id": "shiwu-ch5-002", "err": 66, "q": "投資型保險商品非全權委託的投資標的可包含:A.證券投資信託基金受益憑證;B.共同信託基金受益證券;C.各國中央政府發行之公債、國庫券;D.可轉讓定期存單", "opts": ["ABD", "ABCD", "ABC", "BCD"], "ans": 3, "exp": "可轉讓定期存單為投資型保險商品「全權委託」的投資標的，不屬於非全權委託的投資標的。"}, {"id": "shiwu-ch5-003", "err": 64, "q": "有關實支實付醫療保險控管何者正確?", "opts": ["每㇐被保險人向同㇐保險人投保實支實付保險張數上限為3張", "整體保險業於醫療保險及傷害醫療保險投保1張銜接原給付限額具自負額商品,該張可不列入張數計算", "適用於由要保單位負擔保費之旅平險、微型保險所含之實支實付型傷害醫療保險", "以上皆是"], "ans": 2, "exp": "每一被保險人投保實支實付醫療保險張數上限為3張，不分是否為同一保險人；不包括學生團體保險、團體保險、旅平險、微型保險。"}, {"id": "shiwu-ch5-004", "err": 64, "q": "現行年金保險主要型態來自於A.人壽保險單示範條款;B.利率變動型年金保險單示範條款;C.個人即期年金保險單示範條款;D.個人遞延年金保險單示範條款", "opts": ["ABCD", "ABD", "BCD", "ACD"], "ans": 3, "exp": "年金保險主要型態與人壽保險單示範條款無關。"}, {"id": "shiwu-ch5-005", "err": 58, "q": "為避免投保微型保險所產生的道德危險,有關該險之風險控管機制何者為非?", "opts": ["身故保險金受益人僅以被保險人家屬為限", "保險業者須對承擔之風險妥善處理或適當安排再保險", "失能保險金受益人不得受理指定或變更", "個別被保險人投保微型保險超過累計投保金額限制時,保險業者得自行決定處理方式"], "ans": 1, "exp": "身故保險金受益人之指定及變更，以被保險人家屬或其法定繼承人為限（不只家屬，也包含法定繼承人）。"}, {"id": "shiwu-ch5-006", "err": 57, "q": "實支實付醫療保險副本理賠之控管措施,不適用何種保險A.傷害保險;B.微型保險;C.旅行平安保險;D.學生團體保險", "opts": ["ABC", "BD", "BCD", "ABCD"], "ans": 3, "exp": "副本理賠控管措施不適用於：學生團體保險、團體保險、旅平險、微型保險。"}, {"id": "shiwu-ch5-007", "err": 55, "q": "有關投資型保險商品敘述何者錯誤?", "opts": ["專設帳簿的資產於保險公司破產時,得不受保險公司之債權人扣押", "變額萬能壽險指彈性繳納保險費,保單現金價值有高低起伏但不可能降低至零", "變額壽險指固定繳費,但保險金額隨著投資績效而變動", "變額年金保險指保險費及年金額度都會變動"], "ans": 2, "exp": "變額萬能壽險指彈性繳納保險費，保單現金價值有高低起伏，因投資型保險商品盈虧自負，現金價值是可能降低至零的。"}, {"id": "shiwu-ch5-008", "err": 54, "q": "有關生存保險之敘述,下列何者為是?A.僅在被保險人於保險期滿後仍生存時給付保險金;B.被保險人在保險期間內死亡,保險公司無給付保險金的責任,但退還所繳保費;C.滿期保險金之來源,部分來自保險公司資本;D.保險公司為準備被保險人保險期滿生存時給付保險金,需有責任準備金的提存", "opts": ["ABCD", "AD", "ABD", "AB"], "ans": 2, "exp": "被保險人在保險期間內死亡，保險公司無給付保險金的責任，且「不」退還保費；滿期金來源為自身所繳保費的累積儲蓄生息，並非來自保險公司資本。"}, {"id": "shiwu-ch5-009", "err": 53, "q": "下列何者非團體保險之保險金額決定基礎?", "opts": ["職位年資", "員工的工作性質", "薪資等級", "團體定額"], "ans": 2, "exp": "團體保險之保險金額決定基礎為：薪資等級、職位、年資、團體定額。"}, {"id": "shiwu-ch5-010", "err": 50, "q": "下列何者為招攬人員銷售優體壽險商品應有之行為?", "opts": ["完成優體壽險商品之在職教育訓練始進行銷售", "於招攬時即承諾消費者可適用優體費率", "與其他同業之優體壽險費率、核保項目、標準進行不當比較", "通過優體壽險商品測驗且完成登錄者始進行銷售"], "ans": 1, "exp": "保險公司應慎選招攬人員，事先完成必要之在職教育訓練且經測驗合格；不得於招攬時即承諾消費者可適用優體費率，也不得與同業優體費率不當比較；無須另行辦理登錄。"}, {"id": "shiwu-ch5-011", "err": 50, "q": "年金保險契約之生存年金部分", "opts": ["得有除外責任", "不得有除外責任期間,但得有除外責任原因", "不得有除外責任原因,但得有除外責任期間", "不得有除外責任"], "ans": 4, "exp": "生存年金為保險人承諾在被保險人生存期間定期支付約定金額的一種契約，故年金保險不得有除外責任。"}, {"id": "shiwu-ch5-012", "err": 48, "q": "有關旅行平安保險何者正確?A.醫療費用之給付包含日額型及實支實付型;B.發生意外傷害醫療時,給付最高以保險金額1/10為限;C.屬於國際性保險,承保對象以實際從事旅遊的國內、國外旅客為限;D.保險期間原則上最⾧以180天為限,旅客如有需要經保險公司同意可延⾧", "opts": ["BC", "ABD", "BCD", "ACD"], "ans": 3, "exp": "醫療費用之給付以實支實付為限（非日額型）。"}, {"id": "shiwu-ch5-013", "err": 47, "q": "下列敘述何者錯誤?", "opts": ["⾧期照顧保險給付可分為㇐筆或分期給予固定金額二種", "被保險人經專科醫師診斷判定認知功能障礙為終身無法治癒者,仍須符合契約條款約定之期間限制才可符合認知功能障礙", "若契約條款明定免責期間,被保險人的生理功能障礙或認知功能障礙狀態須超過免責期,保險公司才會給付⾧期照顧保險金", "外溢效果的保險可以達到事前預防風險的效益"], "ans": 2, "exp": "經專科醫師診斷判定生理或認知功能障礙為終身無法治癒者，不受期間限制（不須等待一定月數）。"}, {"id": "shiwu-ch5-014", "err": 44, "q": "有關全民健康保險之內容何者正確?A.保險事故包含疾病、傷害、生育;B.以強制投保為原則;C.主管機關為中央健康保險署;D.保險人為衛生福利部", "opts": ["B", "ABCD", "AB", "ABC"], "ans": 3, "exp": "主管機關為衛生福利部，保險人為衛生福利部中央健康保險署（C、D選項說反了）。"}, {"id": "shiwu-ch5-015", "err": 43, "q": "年金保險的預定附加費用率與相同繳費期間之養老保險的附加費用率比較會", "opts": ["相同", "較高", "較低", "不㇐定"], "ans": 3, "exp": ""}, {"id": "shiwu-ch5-016", "err": 42, "q": "某甲投保每年年末複利增值3%之二十年期養老保險,保額20萬元,某甲在投保後第三年死亡,則其可獲得的死亡保險金為", "opts": ["212,180元", "218,000元", "200,000元", "218,545元"], "ans": 1, "exp": ""}, {"id": "shiwu-ch5-017", "err": 41, "q": "所謂團體㇐年定期壽險之「平均保險費率」是依:A.被保險團體的危險程度;B.每㇐被保險員工的年齡;C.每㇐被保險員工的保險金額;D.每㇐被保險員工的性別;所計算出的保險費總和除以全體被保險員工保險金額總和計算", "opts": ["ABD", "BCD", "ABCD", "ABC"], "ans": 3, "exp": ""}, {"id": "shiwu-ch5-018", "err": 41, "q": "目前學生團體保險之保險給付項目有:A.失能及身故保險金;B.燒燙傷及須重建手術保險金;C.集體中毒保險金;D.生活補助金", "opts": ["BCD", "ABCD", "ACD", "ABC"], "ans": 2, "exp": "學生團體保險給付項目：身故保險金、醫療保險金(住院醫療、傷害門診、燒燙傷及需重建手術保險金)、失能保險金、集體中毒保險金、生活補助保險金。"}, {"id": "shiwu-ch5-019", "err": 41, "q": "有關投資型保險商品銷售之規範,下列何者錯誤?", "opts": ["招攬人員於銷售投資型保險商品2個月前曾協助同㇐保戶辦理貸款者,該員不得支領推介貸款報酬", "當保費資金來源為貸款,原招攬人員應於承保前對客戶進行電訪並保留錄音紀錄以供查核", "招攬人員須另具備投資型保險商品測驗合格且完整變更登錄者", "保險業應訂定客戶紛爭處理程序納入內部控制作業之處理程序,辦理內部稽核及自行查核"], "ans": 2, "exp": "當保費資金來源為貸款、解約或保單借款時，應另指派「非銷售通路人員」於承保前辦理電話訪問並保留錄音紀錄（不是由原招攬人員自己進行）。"}, {"id": "shiwu-ch5-020", "err": 41, "q": "有關外溢效果保險的特色,何者錯誤?", "opts": ["保險公司為掌握保戶生活習慣及取得相關醫療數據,需精進大數據分析", "商品設計有實物給付型及非實物給付型2種", "保險公司須強化資訊安全之風險控管,以免保戶個資外洩", "保險費計算係採總體考量,保費更公平合理,且能引導保戶規避風險,降低整體社會成本"], "ans": 4, "exp": "保險費計算係考量「個體差異」（非總體考量），保費才能更公平合理，並引導保戶規避風險、降低整體社會成本。"}, {"id": "shiwu-ch5-021", "err": 40, "q": "投資型保險商品的設計,可以A.有效對抗通貨膨脹;B.使得個人資金運用及退休計畫更具彈性;C.降低壽險公司經營風險;D.達到金融市場整合功能", "opts": ["AB", "ABD", "BD", "ABCD"], "ans": 4, "exp": "投資型商品利用盈虧自負、彈性繳費的特性，可有效對抗通膨、讓資金運用更彈性、降低壽險公司經營風險，並達到金融市場整合功能。"}, {"id": "shiwu-ch5-022", "err": 39, "q": "團體保險內每位員工對每單位保險金額應繳的保險費通常係以何種費率乘以保險金額總額計算?", "opts": ["分級保險費率", "平均保險費率", "平衡保險費率", "團體保險費率"], "ans": 2, "exp": "團體保險係以「平均保險費率」乘以保險金額總額來計算每位員工應繳保險費。"}, {"id": "shiwu-ch5-023", "err": 39, "q": "有關學生團體保險之敘述,何者為非?", "opts": ["目前保險費由教育部邀集具獨立性的相關代表組成審議會逐年審議", "學生團體保險之身故保險金受益人為被保險人之法定繼承人,醫療保險金之受益人為投保之學生", "設置學生團體保險專戶專款專用,盈虧責任由政府負責", "幼兒參加本保險,於保險契約訂立時已在疾病中,保險人對該項疾病不負給付保險金責任"], "ans": 4, "exp": "學生及幼兒參加本保險，於訂約時已在疾病中者，保險人對該項疾病仍負給付保險金之責任（但高級中等學校進修部及國民補習學校學生不在此保障範圍）。"}, {"id": "shiwu-ch5-024", "err": 37, "q": "有關國民年金制度敘述何者有誤?", "opts": ["提供老年年金、生育給付、身心障礙年金、遺屬年金及喪葬給付等保障", "投保對象為年滿20歲以上未滿65歲於國內設有戶籍的國民", "被保險人死亡時按其月投保金額㇐次發給5個月喪葬給付", "投保對象須為沒有參加軍保、公教保、勞保及農保的國民"], "ans": 2, "exp": "國民年金投保對象為年滿25歲（非20歲），未滿65歲，於國內設有戶籍的國民。"}, {"id": "shiwu-ch5-025", "err": 34, "q": "個人傷害保險短期費率㇐個月期為年繳保費", "opts": ["百分之十二", "百分之二十", "十二分之㇐", "百分之十五"], "ans": 4, "exp": "個人傷害保險短期費率一個月期為年繳保費的15%。"}, {"id": "shiwu-ch5-026", "err": 34, "q": "有關政府推動的⾧期照顧保險,何者錯誤?", "opts": ["屬於㇐種福利政策且為基本保障,可考慮加保㇐般商業⾧期照顧保險商品", "由政府、雇主及民眾共同負責保險費", "屬於強制性社會保險,保險人為衛生福利部", "目前提供的服務皆屬實物給付"], "ans": 3, "exp": "長期照顧保險屬於強制性社會保險，保險人為「中央健康保險署」（非衛生福利部本身）。"}, {"id": "shiwu-ch5-027", "err": 34, "q": "勞工保險之普通事故保險費,被保險人應負擔之比率為", "opts": ["20%", "10%", "30%", "50%"], "ans": 1, "exp": ""}, {"id": "shiwu-ch5-028", "err": 33, "q": "有關學生團體保險之敘述何者錯誤?", "opts": ["辦理本保險如有不足,由專戶填補,保險人不負盈虧之責", "主管機關為金融監督管理委員會", "被保險人為學生,身故保險金受益人為被保險人之法定繼承人", "保險期間每次㇐年且與學年之起訖日㇐致為原則"], "ans": 2, "exp": "學生團體保險主管機關：在中央為教育部，在直轄市為直轄市政府，在縣(市)為縣(市)政府（不是金管會）。"}, {"id": "shiwu-ch5-029", "err": 33, "q": "以下何者為是?", "opts": ["人身保險四種類型中包含責任保險", "人壽保險中包括生存保險、死亡保險及健康保險", "將保險區分財產保險及人身保險兩類,是依據我國保險法第十三條規定", "人身保險包括責任保險及人壽保險"], "ans": 3, "exp": "人身保險四種類型為：人壽、傷害、健康、年金（不含責任保險）；人壽保險中包括生存保險、死亡保險及生死合險（非健康保險）。"}, {"id": "shiwu-ch5-030", "err": 32, "q": "所謂健康保險是指為彌補因A.傷害;B.疾病;C.酗酒;D.健康檢查,造成人們失去工作能力或就醫,而導致經濟上的損失所設計出來的保險", "opts": ["BD", "ABD", "AB", "AC"], "ans": 3, "exp": ""}, {"id": "shiwu-ch5-031", "err": 32, "q": "依據「保險業辦理微型保險業務應注意事項」規定,微型保險附加費用率上限為", "opts": ["純保費之10%", "總保費之15%", "純保費之15%", "總保費之10%"], "ans": 2, "exp": "微型保險附加費用率上限為總保費之15%。"}, {"id": "shiwu-ch5-032", "err": 30, "q": "⾧年期看護保險未來將成為老年人口的重要需求,其可能的原因包含下列何者?A.人類壽命普遍延⾧;B.家庭制度的改變;C.社會福利的不足;D.對通貨膨脹的恐懼", "opts": ["ABC", "ABD", "AC", "ABCD"], "ans": 4, "exp": ""}, {"id": "shiwu-ch5-033", "err": 30, "q": "下列敘述何者正確?", "opts": ["保險公司承保傷害保險時,需檢查被保險人的身體", "定期保險通常以1年、5年、10年為期,亦有以要保人到達終身年齡為約定期限", "外勤業務員的危險性與每天坐辦公室的行政人員危險性差不多", "最後生存者年金之受領人有2人以上,只要其中1人仍生存,保險人就繼續依原定金額給付年金至最後1位受領人死亡為止"], "ans": 4, "exp": "承保傷害保險不需檢查身體，以職業類別為準；定期保險通常以1年、6年、10年、15年或20年為期；外勤業務員（如賽車手、鷹架工）的危險性遠高於坐辦公室的行政人員。"}]}, {"num": 6, "name": "投保實務與契約的選擇", "questions": [{"id": "shiwu-ch6-001", "err": 67, "q": "下列何者係壽險業務員招攬時應注意事項?A.受益人是否被拒保;B.投保金額是否過高至有道德風險之虞;C.受益人對被保險人是否有保險利益;D.要保人是否有家族遺傳疾病", "opts": ["BC", "B", "ABCD", "BCD"], "ans": 2, "exp": "A應為「被保險人」是否被拒保（非受益人）；C應為要保人對被保險人是否具有保險利益（非受益人對被保險人）；D應檢視「被保險人」是否有家族遺傳疾病（非要保人）。"}, {"id": "shiwu-ch6-002", "err": 45, "q": "保險業授權代收保險費之人A.保險公司授權之所屬業務員;B.保險經紀人或其所屬業務員;C.保險公司未登錄之收費員;D.保險代理人或所屬業務員", "opts": ["ABC", "ABCD", "AD", "ABD"], "ans": 3, "exp": "保險業授權所屬保險業務員、保險代理人或其所屬保險業務員代收保險費（不包含未登錄之收費員，也不含保險經紀人）。"}, {"id": "shiwu-ch6-003", "err": 44, "q": "哪些是保戶申請要保前應該提供給保戶之資料?A.條款樣本;B.人壽保險投保人須知;C.商品說明書;D.保單紅利試算表", "opts": ["BCD", "AB", "ABCD", "ABC"], "ans": 4, "exp": "在客戶填寫要保文件前，須將商品條款樣本、人壽保險投保人須知、商品說明書提供給保戶，使其對契約內容有充分了解。"}, {"id": "shiwu-ch6-004", "err": 43, "q": "哪些是保戶申請要保前應該提供給保戶之資料?A.條款樣本;B.人壽保險投保人須知;C.保單紅利試算表;D.保險商品和定存利率比較表", "opts": ["BCD", "AB", "ABCD", "ABC"], "ans": 2, "exp": "僅商品條款樣本、「人壽保險投保人須知」應提供給保戶（保單紅利試算表、定存比較表不在此項要求中）。"}, {"id": "shiwu-ch6-005", "err": 42, "q": "保險業授權代收保險費之人收取以下列何種方式繳納保險費時,應同時交付保戶送金單、預收保費證明或收據?A.現金;B.信用卡授權書;C.支票;D.劃撥匯款單", "opts": ["AC", "ABCD", "AB", "ABC"], "ans": 1, "exp": "收取現金或支票方式繳納保險費時，應同時交付保戶送金單、預收保費證明或收據。"}, {"id": "shiwu-ch6-006", "err": 41, "q": "要保人以自己為被保險人投保人壽保險,業務員對其家族應注意", "opts": ["是否有人患有遺傳性疾病", "是否有人從事危險職業", "家人是否已投保", "以上皆應注意"], "ans": 1, "exp": "契約選擇事項：身體上的危險包含被保險人所患之既往症、現症及家族遺傳病史等，應予告知或聲明。"} "}, {"id": "shiwu-ch7-008", "err": 34, "q": "有關保單活化之敘述,何者錯誤?", "opts": ["保戶可考量實際需求僅作部分轉換,但轉換後則無法再轉回舊保單", "保單活化目的使保戶重新檢視自身保單所需,以提升退休生活的保障", "利用舊保單之保單價值準備金轉換投保醫療險、⾧照險或年金保險", "保戶限向同㇐壽險公司之舊保單身故保險金轉換成新契約之生前養老金"], "ans": 1, "exp": "保戶可僅作部分轉換，轉換後除部分情形外，保險公司應提供回復契約之權利（並非完全無法轉回）。"}, {"id": "shiwu-ch7-009", "err": 32, "q": "電話行銷人員行銷保險A.應說明行銷目的及確認要保人身分;B.應告知行銷人員姓名、登錄字號及所屬公司名稱;C.依個人資料保護法,電話行銷過程不得錄音並備份存檔;D.電話行銷人員若違反辦理電話行銷業務應注意事項,所屬公司應依規定予以懲處", "opts": ["ABCD", "AB", "ABD", "BD"], "ans": 3, "exp": "電話行銷過程應該經過要保人同意全程錄音並備份存檔（非「不得」錄音）。"}]}]}]};

<script>
(function(){

var subjects = QUESTION_DATA.subjects;
var state = {
  subjectIdx:0,
  screen:'home',
  mode:null,
  queue:[],
  idx:0,
  selected:null,
  revealed:false,
  correctCount:0,
  wrongCount:0,
  freeChapters:{},
  freeCount:30,
  mockCount:50,
  timeLeft:0,
  timerHandle:null,
  stats:{}
};

function currentSubject(){ return subjects[state.subjectIdx]; }

function allQuestionsOf(subject){
  var out = [];
  subject.chapters.forEach(function(ch){
    ch.questions.forEach(function(q){
      out.push({ id:q.id, chNum:ch.num, chName:ch.name, q:q.q, opts:q.opts, ans:q.ans, err:q.err, exp:q.exp });
    });
  });
  return out;
}

function resetFreeChapters(){
  state.freeChapters = {};
  currentSubject().chapters.forEach(function(ch){ state.freeChapters[ch.num]=true; });
}
resetFreeChapters();

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i]; arr[i]=arr[j]; arr[j]=t;
  }
  return arr;
}

function storageKey(){ return currentSubject().subjectKey+'-question-stats'; }

async function loadStats(){
  try{
    var r = null; try{ var raw = localStorage.getItem(storageKey()); if(raw) r = {value: raw}; }catch(e){}
    state.stats = r && r.value ? JSON.parse(r.value) : {};
  }catch(e){ state.stats = {}; }
}
async function saveStats(){
  try{ localStorage.setItem(storageKey(), JSON.stringify(state.stats)); }catch(e){}
}
function recordAnswer(id, correct){
  var s = state.stats[id] || {seen:0, wrong:0};
  s.seen += 1;
  if(!correct) s.wrong += 1;
  state.stats[id] = s;
  saveStats();
}

function chapterRiskData(){
  var subj = currentSubject();
  var all = allQuestionsOf(subj);
  return subj.chapters.map(function(ch){
    var qs = all.filter(function(q){return q.chNum===ch.num;});
    var officialAvg = qs.reduce(function(a,q){return a+q.err;},0)/qs.length;
    var seenSum=0, wrongSum=0;
    qs.forEach(function(q){
      var s = state.stats[q.id];
      if(s && s.seen>0){ seenSum+=s.seen; wrongSum+=s.wrong; }
    });
    var personal = seenSum>0 ? (wrongSum/seenSum*100) : null;
    return {num:ch.num, name:ch.name, count:qs.length, officialAvg:officialAvg, personal:personal};
  });
}

function barColor(val){
  if(val>=50) return 'var(--seal)';
  if(val>=30) return 'var(--gold)';
  return 'var(--jade)';
}

function render(){
  var app = document.getElementById('app');
  if(state.screen==='home') app.innerHTML = renderHome();
  else if(state.screen==='setupFree') app.innerHTML = renderSetupFree();
  else if(state.screen==='setupMock') app.innerHTML = renderSetupMock();
  else if(state.screen==='quiz') app.innerHTML = renderQuiz();
  else if(state.screen==='summary') app.innerHTML = renderSummary();
  bindEvents();
}

function subjectTabs(){
  return '<div class="subj-tabs">'+ subjects.map(function(s,i){
    return '<button class="subj-tab'+(i===state.subjectIdx?' active':'')+'" data-action="switchSubject" data-i="'+i+'">'+s.subject+'</button>';
  }).join('') + '</div>';
}

function renderHome(){
  var subj = currentSubject();
  var risk = chapterRiskData();
  var anyData = risk.some(function(r){return r.personal!==null;});
  var rows = risk.map(function(r){
    var val = r.personal!==null ? r.personal : r.officialAvg;
    var label = r.personal!==null ? Math.round(r.personal)+'%' : '官方均'+Math.round(r.officialAvg)+'%';
    var color = r.personal!==null ? barColor(r.personal) : 'var(--line)';
    return '<div class="chapter-row">'+
      '<div class="chapter-name">第'+r.num+'章 '+r.name+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(val,100)+'%;background:'+(r.personal!==null?color:'var(--gold-dim)')+'"></div></div>'+
      '<div class="bar-val stat-num" style="color:'+(r.personal!==null?color:'var(--slate)')+'">'+label+'</div>'+
    '</div>';
  }).join('');

  return ''+
  subjectTabs()+
  '<div class="eyebrow">人身保險業務員資格測驗 · '+subj.subject+'</div>'+
  '<h1 style="font-size:26px;margin-bottom:4px;">應考練習　風險評估</h1>'+
  '<p style="color:var(--slate);font-size:14px;margin-top:6px;margin-bottom:20px;">題庫 '+allQuestionsOf(subj).length+' 題　·　官方考試 '+subj.officialQuestions+' 題 / '+subj.officialMinutes+' 分鐘　·　合格標準：本科至少 60 分</p>'+
  '<div class="card">'+
    '<h3 style="font-size:15px;margin-bottom:12px;color:var(--navy);">個人風險評估表'+(anyData?'':'　<span style="font-size:12px;color:var(--slate);font-weight:400;">(尚無作答紀錄，目前顯示官方平均錯誤率)</span>')+'</h3>'+
    rows+
  '</div>'+
  '<div class="card">'+
    '<h3 style="font-size:15px;margin-bottom:10px;color:var(--navy);">選擇練習模式</h3>'+
    '<div class="btn-row" style="flex-direction:column;align-items:stretch;">'+
      '<button class="btn" data-action="goFree">自由練習　選章節作答</button>'+
      '<button class="btn secondary" data-action="goWeak">弱點複習　依錯誤率加權出題</button>'+
      '<button class="btn secondary" data-action="goMock">模擬考　計時作答</button>'+
    '</div>'+
  '</div>';
}

function renderSetupFree(){
  var subj = currentSubject();
  var rows = subj.chapters.map(function(ch){
    var checked = state.freeChapters[ch.num] ? 'checked' : '';
    return '<label class="checkbox-row"><input type="checkbox" data-chnum="'+ch.num+'" '+checked+'> 第'+ch.num+'章 '+ch.name+' ('+ch.questions.length+'題)</label>';
  }).join('');
  return ''+
  subjectTabs()+
  '<div class="eyebrow">'+subj.subject+' · 自由練習</div>'+
  '<h2 style="margin-bottom:14px;">選擇要練習的章節</h2>'+
  '<div class="card">'+rows+'</div>'+
  '<div class="card">'+
    '<label style="font-size:14px;color:var(--slate);">本次練習題數</label><br>'+
    '<select id="freeCountSel" style="margin-top:8px;padding:8px;font-size:14px;border:1px solid var(--line);border-radius:4px;">'+
      [10,20,30,50,'all'].map(function(n){
        var label = n==='all' ? '全部（已選章節）' : n+' 題';
        var sel = (state.freeCount===n) ? 'selected':'';
        return '<option value="'+n+'" '+sel+'>'+label+'</option>';
      }).join('')+
    '</select>'+
  '</div>'+
  '<div class="btn-row">'+
    '<button class="btn" data-action="startFree">開始練習</button>'+
    '<button class="btn secondary" data-action="backHome">返回</button>'+
  '</div>';
}

function renderSetupMock(){
  var subj = currentSubject();
  return ''+
  subjectTabs()+
  '<div class="eyebrow">'+subj.subject+' · 模擬考</div>'+
  '<h2 style="margin-bottom:14px;">設定模擬考規模</h2>'+
  '<div class="card">'+
    '<p style="font-size:14px;color:var(--slate);margin-top:0;">官方正式考試為 '+subj.officialQuestions+' 題、'+subj.officialMinutes+' 分鐘。題庫共 '+allQuestionsOf(subj).length+' 題，可從中隨機抽題，計時將依比例換算。</p>'+
    '<label style="font-size:14px;">題數</label><br>'+
    '<select id="mockCountSel" style="margin-top:8px;padding:8px;font-size:14px;border:1px solid var(--line);border-radius:4px;">'+
      [25,50,75,Math.min(100, allQuestionsOf(subj).length)].map(function(n){
        var sel=(state.mockCount===n)?'selected':'';
        return '<option value="'+n+'" '+sel+'>'+n+' 題</option>';
      }).join('')+
    '</select>'+
  '</div>'+
  '<div class="btn-row">'+
    '<button class="btn" data-action="startMock">開始計時作答</button>'+
    '<button class="btn secondary" data-action="backHome">返回</button>'+
  '</div>';
}

function renderQuiz(){
  var q = state.queue[state.idx];
  var pct = Math.round((state.idx)/state.queue.length*100);
  var timerHtml = '';
  if(state.mode==='mock'){
    var m = Math.floor(state.timeLeft/60), s = state.timeLeft%60;
    var low = state.timeLeft < 120;
    timerHtml = '<span class="timer'+(low?' low':'')+'">⏱ '+m+':'+(s<10?'0':'')+s+'</span>';
  }
  var optsHtml = q.opts.map(function(opt,i){
    var cls = 'opt';
    if(state.revealed){
      cls += ' disabled-look';
      if(i+1===q.ans) cls += ' correct';
      else if(i+1===state.selected) cls += ' wrong';
    } else if(state.selected===i+1){
      cls += ' selected';
    }
    return '<button class="'+cls+'" data-action="pick" data-i="'+(i+1)+'" '+(state.revealed?'disabled':'')+'>('+ (i+1) +') '+opt+'</button>';
  }).join('');

  var expHtml = '';
  if(state.revealed && q.exp){
    expHtml = '<div class="exp-box"><b>解析：</b>'+q.exp+'</div>';
  } else if(state.revealed && !q.exp){
    expHtml = '<div class="exp-box">本題官方題庫未附額外解析，正確答案如上標示。</div>';
  }

  return ''+
  '<div class="topbar">'+
    '<span>'+currentSubject().subject+'　第 '+(state.idx+1)+' / '+state.queue.length+' 題</span>'+
    timerHtml+
  '</div>'+
  '<div class="progressbar"><div class="progressfill" style="width:'+pct+'%"></div></div>'+
  '<div class="card">'+
    '<div class="qmeta"><span class="qid">'+q.id+'　第'+q.chNum+'章 '+q.chName+'</span><span class="errtag">官方錯誤率 '+q.err+'%</span></div>'+
    '<div class="qtext">'+q.q+'</div>'+
    optsHtml+
    expHtml+
  '</div>'+
  '<div class="btn-row">'+
    (state.revealed ?
      '<button class="btn" data-action="next">'+(state.idx+1<state.queue.length?'下一題':'查看結果')+'</button>'
      : '<button class="btn secondary" data-action="quit">結束本次練習</button>')+
  '</div>';
}

function renderSummary(){
  var total = state.correctCount+state.wrongCount;
  var pct = total>0 ? Math.round(state.correctCount/total*100) : 0;
  var pass = pct>=60;
  return ''+
  subjectTabs()+
  '<div class="eyebrow">'+currentSubject().subject+' · 本次練習結果</div>'+
  '<div class="card" style="display:flex;align-items:center;gap:18px;">'+
    '<div class="seal-badge'+(pass?' pass':'')+'">'+(pass?'通過':'再加油')+'</div>'+
    '<div>'+
      '<div style="font-size:30px;font-weight:700;" class="stat-num">'+pct+'<span style="font-size:16px;color:var(--slate);">分（換算100分制）</span></div>'+
      '<div style="color:var(--slate);font-size:14px;">共作答 '+total+' 題　答對 '+state.correctCount+' 題　答錯 '+state.wrongCount+' 題</div>'+
    '</div>'+
  '</div>'+
  '<p style="font-size:13px;color:var(--slate);">官方合格標準為本科至少60分（且兩科總分達140分），此處換算僅供參考。</p>'+
  '<div class="btn-row">'+
    '<button class="btn" data-action="goWeak">繼續弱點複習</button>'+
    '<button class="btn secondary" data-action="backHome">回首頁看風險評估</button>'+
  '</div>';
}

function startTimer(totalSeconds){
  state.timeLeft = totalSeconds;
  if(state.timerHandle) clearInterval(state.timerHandle);
  state.timerHandle = setInterval(function(){
    state.timeLeft -= 1;
    if(state.timeLeft<=0){
      clearInterval(state.timerHandle);
      finishSession();
      return;
    }
    var t = document.querySelector('.timer');
    if(t){
      var m = Math.floor(state.timeLeft/60), s = state.timeLeft%60;
      t.classList.toggle('low', state.timeLeft<120);
      t.innerHTML = '⏱ '+m+':'+(s<10?'0':'')+s;
    }
  },1000);
}
function stopTimer(){ if(state.timerHandle){ clearInterval(state.timerHandle); state.timerHandle=null; } }

function buildWeakQueue(n){
  var all = allQuestionsOf(currentSubject());
  var scored = all.map(function(q){
    var s = state.stats[q.id];
    var personalRate = (s && s.seen>0) ? (s.wrong/s.seen*100) : null;
    var score = personalRate!==null ? (personalRate*0.65 + q.err*0.35) : q.err;
    return {q:q, score:score};
  });
  scored.sort(function(a,b){return b.score-a.score;});
  var poolSize = Math.max(n*2, Math.ceil(scored.length*0.5));
  var pool = scored.slice(0, Math.min(poolSize, scored.length)).map(function(x){return x.q;});
  shuffle(pool);
  return pool.slice(0, Math.min(n, pool.length));
}

function resetSession(){
  state.idx=0; state.selected=null; state.revealed=false;
  state.correctCount=0; state.wrongCount=0;
}

function finishSession(){
  stopTimer();
  state.screen='summary';
  render();
}

function bindEvents(){
  document.querySelectorAll('[data-action]').forEach(function(node){
    node.addEventListener('click', function(){
      var action = node.getAttribute('data-action');
      if(action==='switchSubject'){
        var i = Number(node.getAttribute('data-i'));
        if(i!==state.subjectIdx){
          stopTimer();
          state.subjectIdx = i;
          resetFreeChapters();
          state.screen='home';
          loadStats().then(render);
        }
      }
      else if(action==='goFree'){ state.screen='setupFree'; render(); }
      else if(action==='goWeak'){
        state.mode='weak'; state.queue=buildWeakQueue(20); resetSession(); state.screen='quiz'; render();
      }
      else if(action==='goMock'){ state.screen='setupMock'; render(); }
      else if(action==='backHome'){ stopTimer(); state.screen='home'; render(); }
      else if(action==='startFree'){
        var chosen = Object.keys(state.freeChapters).filter(function(k){return state.freeChapters[k];}).map(Number);
        var pool = allQuestionsOf(currentSubject()).filter(function(q){return chosen.indexOf(q.chNum)>-1;});
        shuffle(pool);
        if(state.freeCount!=='all'){ pool = pool.slice(0, state.freeCount); }
        state.mode='free'; state.queue=pool; resetSession(); state.screen='quiz'; render();
      }
      else if(action==='startMock'){
        var subj = currentSubject();
        var pool = allQuestionsOf(subj);
        shuffle(pool);
        pool = pool.slice(0, state.mockCount);
        state.mode='mock'; state.queue=pool; resetSession(); state.screen='quiz';
        render();
        var totalSeconds = Math.round(subj.officialMinutes*60*state.mockCount/subj.officialQuestions);
        startTimer(totalSeconds);
      }
      else if(action==='pick'){
        if(state.revealed) return;
        var i = Number(node.getAttribute('data-i'));
        state.selected = i;
        state.revealed = true;
        var q = state.queue[state.idx];
        var correct = (i===q.ans);
        if(correct) state.correctCount++; else state.wrongCount++;
        recordAnswer(q.id, correct);
        render();
      }
      else if(action==='next'){
        if(state.idx+1 < state.queue.length){
          state.idx++; state.selected=null; state.revealed=false; render();
        } else {
          finishSession();
        }
      }
      else if(action==='quit'){ finishSession(); }
    });
  });

  document.querySelectorAll('[data-chnum]').forEach(function(cb){
    cb.addEventListener('change', function(){
      state.freeChapters[Number(cb.getAttribute('data-chnum'))] = cb.checked;
    });
  });
  var fsel = document.getElementById('freeCountSel');
  if(fsel) fsel.addEventListener('change', function(){
    state.freeCount = fsel.value==='all' ? 'all' : Number(fsel.value);
  });
  var msel = document.getElementById('mockCountSel');
  if(msel) msel.addEventListener('change', function(){
    state.mockCount = Number(msel.value);
  });
}

loadStats().then(render);

})();

</script>
</body>
</html>
